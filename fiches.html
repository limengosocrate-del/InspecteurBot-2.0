<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiches de Contrôle | InspecteurBot RDC</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="main-content">

<section class="dashboard-section">

<h2>
<i class="fa-solid fa-clipboard-list"></i>
FICHES DE CONTRÔLE
</h2>

<div class="chart-box">

<h3>Nouvelle Fiche de Contrôle</h3>

<form id="formFiche">

<input
type="text"
id="entreprise"
placeholder="Nom de l'entreprise"
required>

<label>Tableau FO1</label>
<select id="fo1">
<option value="Conforme">Conforme</option>
<option value="Non conforme">Non conforme</option>
</select>

<label>Tableau FO2</label>
<select id="fo2">
<option value="Conforme">Conforme</option>
<option value="Non conforme">Non conforme</option>
</select>

<label>Tableau FO3</label>
<select id="fo3">
<option value="Conforme">Conforme</option>
<option value="Non conforme">Non conforme</option>
</select>

<label>Tableau SMIG</label>
<select id="smig">
<option value="Conforme">Conforme</option>
<option value="Non conforme">Non conforme</option>
</select>

<label>Date d'inspection</label>

<input
type="date"
id="dateInspection"
required>

<br><br>

<button type="submit">
<i class="fa-solid fa-save"></i>
Enregistrer la fiche
</button>

</form>

</div>

<div class="inspection-list">

<h3>
<i class="fa-solid fa-table"></i>
Liste des Fiches de Contrôle
</h3>

<table>

<thead>

<tr>
<th>Entreprise</th>
<th>FO1</th>
<th>FO2</th>
<th>FO3</th>
<th>SMIG</th>
<th>Date Inspection</th>
<th>Action</th>
</tr>

</thead>

<tbody id="tableFiches">

</tbody>

</table>

</div>

</section>

</div>

<script>

let fiches =
JSON.parse(
localStorage.getItem("fiches")
) || [];

function badge(valeur){

if(valeur==="Conforme"){
return `<span class="success">Conforme</span>`;
}

return `<span class="danger">Non conforme</span>`;
}

function afficherFiches(){

let html = "";

fiches.forEach((f,index)=>{

html += `
<tr>

<td>${f.entreprise}</td>

<td>${badge(f.fo1)}</td>

<td>${badge(f.fo2)}</td>

<td>${badge(f.fo3)}</td>

<td>${badge(f.smig)}</td>

<td>${f.date}</td>

<td>

<button
class="delete"
onclick="supprimer(${index})">

<i class="fa-solid fa-trash"></i>
Supprimer

</button>

</td>

</tr>
`;
});

document.getElementById(
"tableFiches"
).innerHTML = html;
}

document.getElementById(
"formFiche"
).addEventListener(
"submit",
function(e){

e.preventDefault();

fiches.push({

entreprise:
document.getElementById(
"entreprise"
).value,

fo1:
document.getElementById(
"fo1"
).value,

fo2:
document.getElementById(
"fo2"
).value,

fo3:
document.getElementById(
"fo3"
).value,

smig:
document.getElementById(
"smig"
).value,

date:
document.getElementById(
"dateInspection"
).value

});

localStorage.setItem(
"fiches",
JSON.stringify(fiches)
);

this.reset();

afficherFiches();

});

function supprimer(index){

if(confirm(
"Supprimer cette fiche de contrôle ?"
)){

fiches.splice(index,1);

localStorage.setItem(
"fiches",
JSON.stringify(fiches)
);

afficherFiches();

}
}

afficherFiches();

</script>

</body>
  </html>
