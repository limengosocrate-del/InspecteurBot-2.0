<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion des Entreprises</title>

<style>
body{
    font-family:Poppins,sans-serif;
    background:#edf2f9;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.card{
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    margin-bottom:30px;
}

h1{
    color:#041c5c;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:15px;
    border:1px solid #ddd;
    border-radius:12px;
    margin-bottom:15px;
}

button{
    border:none;
    background:#0b52d6;
    color:#fff;
    padding:15px 30px;
    border-radius:12px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,
td{
    padding:15px;
    border-bottom:1px solid #ddd;
    text-align:left;
}

.delete{
    background:#e21b23;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>Gestion des Entreprises</h1>

<input type="text" id="nom" placeholder="Nom de l'entreprise">

<input type="text" id="rccm" placeholder="RCCM">

<input type="text" id="secteur" placeholder="Secteur d'activité">

<input type="text" id="adresse" placeholder="Adresse">

<input type="text" id="telephone" placeholder="Téléphone">

<input type="number" id="travailleurs"
placeholder="Nombre de travailleurs">

<button onclick="ajouterEntreprise()">
Enregistrer
</button>

</div>

<div class="card">

<h1>Liste des Entreprises</h1>

<table>

<thead>
<tr>
<th>N°</th>
<th>Entreprise</th>
<th>RCCM</th>
<th>Secteur</th>
<th>Travailleurs</th>
<th>Action</th>
</tr>
</thead>

<tbody id="listeEntreprises">
</tbody>

</table>

</div>

</div>

<script>

let entreprises =
JSON.parse(localStorage.getItem("entreprises")) || [];

function afficherEntreprises(){

    let html = "";

    entreprises.forEach((e,index)=>{

        html += `
        <tr>

        <td>${index+1}</td>
        <td>${e.nom}</td>
        <td>${e.rccm}</td>
        <td>${e.secteur}</td>
        <td>${e.travailleurs}</td>

        <td>
        <button class="delete"
        onclick="supprimerEntreprise(${index})">
        Supprimer
        </button>
        </td>

        </tr>
        `;
    });

    document.getElementById(
        "listeEntreprises"
    ).innerHTML = html;
}

function ajouterEntreprise(){

    let nom =
    document.getElementById("nom").value;

    let rccm =
    document.getElementById("rccm").value;

    let secteur =
    document.getElementById("secteur").value;

    let adresse =
    document.getElementById("adresse").value;

    let telephone =
    document.getElementById("telephone").value;

    let travailleurs =
    document.getElementById("travailleurs").value;

    if(nom===""){
        alert("Entrez le nom de l'entreprise");
        return;
    }

    entreprises.push({
        nom,
        rccm,
        secteur,
        adresse,
        telephone,
        travailleurs
    });

    localStorage.setItem(
        "entreprises",
        JSON.stringify(entreprises)
    );

    afficherEntreprises();

    document.getElementById("nom").value="";
    document.getElementById("rccm").value="";
    document.getElementById("secteur").value="";
    document.getElementById("adresse").value="";
    document.getElementById("telephone").value="";
    document.getElementById("travailleurs").value="";
}

function supprimerEntreprise(index){

    entreprises.splice(index,1);

    localStorage.setItem(
        "entreprises",
        JSON.stringify(entreprises)
    );

    afficherEntreprises();
}

afficherEntreprises();

</script>

</body>
  </html>
