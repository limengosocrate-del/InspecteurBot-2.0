
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Gestion des Entreprises</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="main-content">

<section class="dashboard-section">

<h2>
<i class="fa-solid fa-building"></i>
GESTION DES ENTREPRISES
</h2>

<div class="chart-box">

<h3>Nouvelle Entreprise</h3>

<form id="formEntreprise">

<input
type="text"
id="nom"
placeholder="Nom de l'entreprise"
required>

<input
type="text"
id="rccm"
placeholder="Numéro RCCM">

<input
type="text"
id="secteur"
placeholder="Secteur d'activité">

<input
type="text"
id="adresse"
placeholder="Adresse complète">

<input
type="text"
id="telephone"
placeholder="Téléphone">

<input
type="number"
id="travailleurs"
placeholder="Nombre de travailleurs">

<button type="submit">

<i class="fa-solid fa-floppy-disk"></i>
Enregistrer l'entreprise

</button>

</form>

</div>

<div class="inspection-list">

<h3>
<i class="fa-solid fa-list"></i>
Liste des Entreprises
</h3>

<table>

<thead>

<tr>
<th>N°</th>
<th>Entreprise</th>
<th>RCCM</th>
<th>Secteur</th>
<th>Travailleurs</th>
<th>Action</th>
</tr>

</thead>

<tbody id="listeEntreprises">

</tbody>

</table>

</div>

</section>

</div>

<script>

let entreprises =
JSON.parse(
localStorage.getItem("entreprises")
) || [];

function afficherEntreprises(){

let html = "";

entreprises.forEach((e,index)=>{

html += `
<tr>

<td>${index + 1}</td>

<td>${e.nom}</td>

<td>${e.rccm}</td>

<td>${e.secteur}</td>

<td>${e.travailleurs}</td>

<td>

<button
onclick="supprimerEntreprise(${index})">

<i class="fa-solid fa-trash"></i>
Supprimer

</button>

</td>

</tr>
`;

});

document.getElementById(
"listeEntreprises"
).innerHTML = html;

}

document.getElementById(
"formEntreprise"
).addEventListener(
"submit",
function(e){

e.preventDefault();

entreprises.push({

nom:
document.getElementById(
"nom"
).value,

rccm:
document.getElementById(
"rccm"
).value,

secteur:
document.getElementById(
"secteur"
).value,

adresse:
document.getElementById(
"adresse"
).value,

telephone:
document.getElementById(
"telephone"
).value,

travailleurs:
document.getElementById(
"travailleurs"
).value

});

localStorage.setItem(
"entreprises",
JSON.stringify(entreprises)
);

this.reset();

afficherEntreprises();

});

function supprimerEntreprise(index){

if(confirm(
"Supprimer cette entreprise ?"
)){

entreprises.splice(index,1);

localStorage.setItem(
"entreprises",
JSON.stringify(entreprises)
);

afficherEntreprises();

}

}

afficherEntreprises();

</script>

</body>
    </html>
