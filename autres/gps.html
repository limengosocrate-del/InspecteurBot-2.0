<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Localisation GPS — InspecteurBot RDC</title>
<link rel="stylesheet" href="../fiche.css?v=41">
<link rel="stylesheet" href="decompte-final.css?v=1">
</head>
<body>
<div class="background"></div>
<div class="particles"></div>

<header class="header">
  <div class="header-left">
    <div class="logo"><img src="../assets/images/logo-igt.png" alt="IGT"></div>
    <div class="header-text">
      <h1>📍 LOCALISATION GPS</h1>
      <h2>Géolocalisation des missions</h2>
    </div>
  </div>
  <div class="header-right"><a href="../index.html" class="btn-retour">← Retour</a></div>
</header>

<main class="df-main">
  <div class="df-form-section">
    <h3>🌐 Position actuelle</h3>
    <div class="actions">
      <button class="btn-primary" id="btnLocate">📍 Me localiser</button>
    </div>
    <div id="pos" style="margin-top:15px; color:#fff;"></div>
  </div>

  <div class="df-form-section">
    <h3>💾 Enregistrer cette position comme mission</h3>
    <div class="grid-2">
      <div class="field"><label>Nom de la mission / entreprise</label><input type="text" id="nomM" placeholder="Ex: Contrôle SARL XYZ"></div>
      <div class="field"><label>Notes</label><input type="text" id="notesM"></div>
    </div>
    <div class="actions">
      <button class="btn-primary" id="btnSave">💾 Enregistrer</button>
    </div>
  </div>

  <div class="df-form-section">
    <h3>📚 Missions enregistrées</h3>
    <div id="listMissions"></div>
  </div>
</main>

<script src="../js/gps.js?v=1"></script>
<script>
async function locate() {

  const box = document.getElementById("pos");

  box.innerHTML = "⏳ Recherche de votre position GPS...";

  try {

    const p = await GPS.getPosition();

    const adr = await GPS.getAddress(p.lat, p.lng);

    const heure = new Date(p.timestamp).toLocaleString("fr-FR");

    box.innerHTML = `

      <div class="info-card" style="background:rgba(255,215,0,0.08);padding:18px;border-left:5px solid #FFD700;border-radius:10px;color:#fff;line-height:1.8;">

        <h4 style="margin-top:0;color:#FFD700;">
        📍 Ma position actuelle
        </h4>

        <p>🟢 <strong>Statut :</strong> ${p.status}</p>

        <p>🌍 <strong>Latitude :</strong> ${p.lat.toFixed(6)}</p>

        <p>🌍 <strong>Longitude :</strong> ${p.lng.toFixed(6)}</p>

        <p>🎯 <strong>Précision :</strong> ${Math.round(p.accuracy)} mètres</p>

        <p>🏙️ <strong>Ville :</strong> ${adr.ville}</p>

        <p>🏘️ <strong>Commune :</strong> ${adr.commune}</p>

        <p>🌍 <strong>Pays :</strong> ${adr.pays}</p>

        <p>🏠 <strong>Adresse :</strong><br>${adr.complet}</p>

        <p>🕒 <strong>Heure :</strong> ${heure}</p>

        <div style="margin-top:15px;display:flex;gap:10px;flex-wrap:wrap;">

          <a href="https://www.google.com/maps?q=${p.lat},${p.lng}"
             target="_blank"
             class="btn-primary">
             🗺️ Ouvrir Google Maps
          </a>

          <button class="btn-primary"
                  onclick="GPS.copyPosition()">
            📋 Copier
          </button>

          <button class="btn-primary"
                  onclick="GPS.sharePosition()">
            📤 Partager
          </button>

        </div>

      </div>

    `;

  }

  catch(e){

    box.innerHTML = `
      <div class="alert-smig">
        ❌ ${e}
      </div>
    `;

  }

}
</script>
</body>
</html>
