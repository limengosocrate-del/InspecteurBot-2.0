<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recommandations IA — InspecteurBot RDC</title>
<link rel="stylesheet" href="../fiche.css?v=41">
<link rel="stylesheet" href="../autres/decompte-final.css?v=1">
</head>
<body>
<div class="background"></div>
<div class="particles"></div>

<header class="header">
  <div class="header-left">
    <div class="logo"><img src="../assets/images/logo-igt.png" alt="IGT"></div>
    <div class="header-text">
      <h1>💡 RECOMMANDATIONS INTELLIGENTES</h1>
      <h2>Conseils personnalisés par situation</h2>
    </div>
  </div>
  <div class="header-right"><a href="../index.html" class="btn-retour">← Retour</a></div>
</header>

<main class="df-main">
  <div class="df-form-section">
    <h3>📋 Décrivez la situation</h3>
    <div class="grid-2">
      <div class="field">
        <label>Type de situation</label>
        <select id="situation">
          <option value="licenciement">Licenciement d'un travailleur</option>
          <option value="demission">Démission volontaire</option>
          <option value="faute_lourde">Faute lourde présumée</option>
          <option value="salaire_impaye">Salaire impayé</option>
          <option value="accident">Accident du travail</option>
          <option value="harcelement">Harcèlement / discrimination</option>
          <option value="conge_refuse">Congé refusé</option>
          <option value="heures_sup">Heures supplémentaires non payées</option>
          <option value="mineur">Travail d'un mineur</option>
          <option value="etranger">Emploi d'étranger sans carte de travail</option>
          <option value="cotisation">Non-paiement cotisations sociales</option>
          <option value="grossesse">Licenciement femme enceinte</option>
        </select>
      </div>
      <div class="field">
        <label>Ancienneté (années)</label>
        <input type="number" id="anciennete" value="1" min="0">
      </div>
      <div class="field">
        <label>Catégorie</label>
        <select id="cat">
          <option value="I">I - Manœuvre</option>
          <option value="II">II - Manœuvre spécialisé</option>
          <option value="III">III - Semi-qualifié</option>
          <option value="IV">IV - Qualifié</option>
          <option value="V">V - Hautement qualifié</option>
          <option value="VI">VI - Maîtrise</option>
          <option value="VII">VII - Cadre</option>
        </select>
      </div>
      <div class="field">
        <label>Détails complémentaires</label>
        <textarea id="details" rows="3" style="background:rgba(0,0,0,0.3); color:#fff; border:1px solid #FFD700; padding:8px; border-radius:6px;"></textarea>
      </div>
    </div>
    <div class="actions">
      <button class="btn-primary" id="btnReco">💡 GÉNÉRER RECOMMANDATIONS</button>
    </div>
  </div>

  <div id="recoResult" style="display:none;">
    <div class="df-resultats">
      <h2 style="color:#FFD700;">📋 Recommandations personnalisées</h2>
      <div id="recoBody"></div>
    </div>
  </div>
</main>

<script src="../js/smig-data.js?v=1"></script>
<script src="../js/ai-knowledge.js?v=1"></script>
<script src="../js/ai-nlp.js?v=1"></script>
<script src="../js/ai-core.js?v=1"></script>
<script>
const RECO_BASE = {
  licenciement: {
    titre: "🚨 Licenciement",
    references: ["Art. 62 CT", "Art. 64 CT", "Art. 71 CT"],
    actions: [
      "Vérifier l'existence d'un MOTIF VALABLE (Art. 62)",
      "Contrôler le respect du préavis légal ou son indemnité compensatoire",
      "S'assurer qu'un décompte final complet a été remis",
      "Contrôler la remise du certificat de travail",
      "Vérifier la déclaration ONEM de rupture de contrat",
      "En cas de licenciement abusif : dommages-intérêts (Art. 63)"
    ],
    documents: ["Lettre de licenciement", "Décompte final", "Certificat de travail", "Reçu solde de tout compte"]
  },
  demission: {
    titre: "📤 Démission volontaire",
    references: ["Art. 64 CT", "Art. 71 CT"],
    actions: [
      "Vérifier la lettre écrite de démission",
      "Respect du préavis (base ÷ 2 pour le travailleur qui démissionne)",
      "Établir le décompte final",
      "Remettre le certificat de travail"
    ],
    documents: ["Lettre de démission", "Décompte final", "Certificat de travail"]
  },
  faute_lourde: {
    titre: "⚠️ Faute lourde",
    references: ["Art. 72 CT", "Art. 74 CT"],
    actions: [
      "Vérifier la PROCÉDURE DISCIPLINAIRE (audition écrite du travailleur)",
      "PV d'audition signé",
      "Preuves matérielles de la faute (témoins, documents)",
      "Notification écrite avec motifs précis",
      "En cas de faute lourde avérée : pas de préavis, pas d'indemnités",
      "MAIS le salaire de la période travaillée + congés dus doivent être payés"
    ],
    documents: ["PV d'audition", "Lettre notification faute lourde", "Preuves"]
  },
  salaire_impaye: {
    titre: "💰 Salaire impayé",
    references: ["Art. 86 CT", "Art. 87 CT", "Décret 25/22"],
    actions: [
      "Contrôler la périodicité de paiement (mensuel obligatoire)",
      "Vérifier bulletins de paie et livre de paie",
      "Constater le montant dû et la période",
      "Adresser mise en demeure à l'employeur (délai 8 jours)",
      "PV d'infraction si non-régularisation",
      "Sanctions pénales possibles (Art. 321 & suiv.)"
    ],
    documents: ["Bulletins de paie", "Livre de paie", "Mise en demeure", "PV d'infraction"]
  },
  accident: {
    titre: "🏥 Accident du travail",
    references: ["Art. 175 CT", "Loi CNSS"],
    actions: [
      "Déclaration à la CNSS dans les 48h",
      "Enquête accident immédiate (PV)",
      "Examen médical par médecin du travail",
      "Vérifier les EPI et conditions de sécurité (F03/F04/F05/F06)",
      "Registre des accidents à jour",
      "Prise en charge médicale intégrale par CNSS"
    ],
    documents: ["Déclaration CNSS", "PV enquête", "Certificat médical", "Registre accidents"]
  },
  harcelement: {
    titre: "🛡️ Harcèlement / Discrimination",
    references: ["Art. 1 CT", "Convention OIT C111", "Constitution art. 12"],
    actions: [
      "Auditionner la victime et les témoins (confidentialité)",
      "Établir PV détaillé",
      "Vérifier existence règlement intérieur contre harcèlement",
      "Sanctions à l'égard de l'auteur",
      "Protection immédiate de la victime",
      "Signalement au parquet si infraction pénale"
    ],
    documents: ["PV audition victime", "PV audition témoins", "Règlement intérieur"]
  },
  conge_refuse: {
    titre: "📅 Congé refusé",
    references: ["Art. 140-147 CT"],
    actions: [
      "Vérifier ancienneté (min. 1 an de service continu)",
      "18 jours ouvrables (adulte) + 1 jour/3 ans ancienneté",
      "Le congé doit être pris dans les 12 mois après le droit acquis",
      "Refus abusif = infraction. Mise en demeure à l'employeur",
      "En cas de rupture : indemnité compensatoire obligatoire"
    ],
    documents: ["Demande de congé", "Registre des congés", "Mise en demeure"]
  },
  heures_sup: {
    titre: "⏰ Heures supplémentaires impayées",
    references: ["Art. 119-122 CT"],
    actions: [
      "Vérifier registre du temps de travail",
      "Calcul : +30% (6 premières), +60% (au-delà), +100% dimanches/fériés, +50% nuit",
      "Réclamer paiement rétroactif avec intérêts",
      "PV d'infraction si non-conformité"
    ],
    documents: ["Registre temps de travail", "Bulletins de paie", "Fiches de pointage"]
  },
  mineur: {
    titre: "👶 Travail d'un mineur",
    references: ["Art. 6 CT", "Convention OIT C138 et C182"],
    actions: [
      "Âge minimum : 16 ans (avec autorisation parentale)",
      "Interdit : travaux dangereux, insalubres, de nuit",
      "Vérifier acte de naissance et autorisation parentale",
      "Contrôler durée du travail (limité)",
      "26 jours de congé annuel",
      "En cas d'infraction : sanctions pénales sévères"
    ],
    documents: ["Acte naissance", "Autorisation parentale", "Contrat spécial"]
  },
  etranger: {
    titre: "🌍 Étranger sans carte de travail",
    references: ["Art. 2 CT", "Fiche F02", "Décret carte de travail"],
    actions: [
      "Contrôler la CARTE DE TRAVAIL délivrée par la Commission Nationale",
      "Vérifier le respect du ratio 90% nationaux / 10% étrangers",
      "Contrôler visa de contrat par l'ONEM",
      "En cas d'infraction : expulsion + amendes lourdes",
      "Employeur sanctionné pénalement"
    ],
    documents: ["Carte de travail", "Visa contrat ONEM", "Registre étrangers"]
  },
  cotisation: {
    titre: "💼 Non-paiement cotisations sociales",
    references: ["Loi CNSS", "Loi ONEM", "Loi INPP"],
    actions: [
      "Vérifier déclarations trimestrielles CNSS",
      "Contrôler versements ONEM (0.2%) et INPP (1-3% selon secteur)",
      "Attestations à jour",
      "Mise en demeure de régulariser (délai 15 j)",
      "PV d'infraction si récidive",
      "Majorations et pénalités de retard"
    ],
    documents: ["Bordereaux CNSS/ONEM/INPP", "Attestations", "Mise en demeure"]
  },
  grossesse: {
    titre: "🤰 Licenciement femme enceinte",
    references: ["Art. 128-137 CT", "Convention OIT C183"],
    actions: [
      "PROTECTION SPÉCIALE : Licenciement INTERDIT pendant grossesse et 8 semaines après accouchement",
      "Si licenciement quand même : NULLITÉ + réintégration + dommages",
      "Congé maternité : 14 semaines rémunérées (6 avant, 8 après)",
      "Aménagements possibles du poste de travail",
      "PV d'infraction et poursuites pénales possibles"
    ],
    documents: ["Certificat grossesse", "Congé maternité", "Bulletins de paie"]
  }
};

document.getElementById("btnReco").onclick = () => {
  const sit = document.getElementById("situation").value;
  const anc = parseInt(document.getElementById("anciennete").value, 10) || 0;
  const cat = document.getElementById("cat").value;
  const det = document.getElementById("details").value;

  const r = RECO_BASE[sit];
  if (!r) return;

  // Calcul préavis selon situation
  const type = ["I","II","III","IV","V"].includes(cat) ? "classifie" : cat === "VI" ? "maitrise" : "cadre";
  const p = SMIG_DATA.preavis[type];
  const preavisJours = sit === "faute_lourde" ? 0 : Math.ceil((sit==="demission" ? p.base/2 : p.base) + p.parAnnee * anc);

  document.getElementById("recoResult").style.display = "block";
  document.getElementById("recoBody").innerHTML = `
    <div class="info-card" style="background:rgba(255,215,0,0.1); padding:15px; border-left:4px solid #FFD700; border-radius:8px; margin:15px 0; color:#fff;">
      <h3 style="color:#FFD700; margin-top:0;">${r.titre}</h3>
      <p><strong>Références juridiques :</strong> ${r.references.join(" • ")}</p>
      <p><strong>Préavis applicable :</strong> ${preavisJours} jours (${type}, ${anc} an(s) d'ancienneté)</p>
    </div>

    <h3>✅ Actions à mener</h3>
    <div class="reco-box"><ul>${r.actions.map(a => `<li>${a}</li>`).join("")}</ul></div>

    <h3>📄 Documents à vérifier / rassembler</h3>
    <div style="display:flex; flex-wrap:wrap; gap:8px;">
      ${r.documents.map(d => `<span style="background:rgba(255,215,0,0.2); color:#FFD700; padding:8px 14px; border-radius:20px;">📄 ${d}</span>`).join("")}
    </div>

    ${det ? `<h3>📝 Analyse contextuelle</h3><div style="background:rgba(0,0,0,0.3); padding:15px; border-radius:8px; color:#fff;">${det}</div>` : ""}

    <h3>⚖️ Base légale à invoquer</h3>
    <div style="color:#fff;">
      ${r.references.map(ref => {
        const m = ref.match(/art\.?\s*(\d+)/i);
        if (m) {
          const art = KNOWLEDGE_BASE.codeTravail.find(a => a.art === parseInt(m[1],10));
          return art ? `<div style="background:rgba(0,0,0,0.3); padding:12px; border-radius:6px; margin:8px 0;"><strong>${ref}</strong> — ${art.titre}<br><em>${art.texte.substring(0,200)}...</em></div>` : `<div>• ${ref}</div>`;
        }
        return `<div>• ${ref}</div>`;
      }).join("")}
    </div>
  `;
  document.getElementById("recoResult").scrollIntoView({behavior:"smooth"});
};
</script>
</body>
      </html>
