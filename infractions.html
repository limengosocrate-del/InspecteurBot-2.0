<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestion des Infractions</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="main-content">

<section class="dashboard-section">

<h2>
<i class="fa-solid fa-triangle-exclamation"></i>
GESTION DES INFRACTIONS
</h2>

<div class="chart-box">

<h3>Nouvelle Infraction</h3>

<form id="formInfraction">

<input
type="text"
id="entreprise"
placeholder="Nom de l'entreprise"
required>

<select id="infraction" required>

<option value="">
Choisir le type d'infraction
</option>

<option>
Travail dissimulé
</option>

<option>
Non-respect du SMIG
</option>

<option>
Absence de contrat de travail
</option>

<option>
Non-déclaration des travailleurs
</option>

<option>
Non-paiement des salaires
</option>

<option>
Non-respect des congés
</option>

<option>
Violation des règles de sécurité
</option>

<option>
Obstruction à l'inspection
</option>

<option>
Autre infraction
</option>

</select>

<input
type="text"
id="sanction"
placeholder="Sanction ou mesure prise"
required>

<button type="submit">
<i class="fa-solid fa-floppy-disk"></i>
Enregistrer l'infraction
</button>

</form>

</div>

<div class="inspection-list">

<h3>
<i class="fa-solid fa-list"></i>
Liste des Infractions
</h3>

<table>

<thead>

<tr>
<th>N°</th>
<th>Entreprise</th>
<th>Infraction</th>
<th>Sanction</th>
<th>Action</th>
</tr>

</thead>

<tbody id="listeInfractions">

</tbody>

</table>

</div>

</section>

</div>

<script>

let infractions =
JSON.parse(
localStorage.getItem("infractions")
) || [];

function afficherInfractions(){

let html = "";

infractions.forEach((i,index)=>{

html += `
<tr>

<td>${index + 1}</td>

<td>${i.entreprise}</td>

<td>${i.infraction}</td>

<td>${i.sanction}</td>

<td>

<button
onclick="supprimerInfraction(${index})">

<i class="fa-solid fa-trash"></i>
Supprimer

</button>

</td>

</tr>
`;

});

document.getElementById(
"listeInfractions"
).innerHTML = html;

}

document.getElementById(
"formInfraction"
).addEventListener(
"submit",
function(e){

e.preventDefault();

infractions.push({

entreprise:
document.getElementById(
"entreprise"
).value,

infraction:
document.getElementById(
"infraction"
).value,

sanction:
document.getElementById(
"sanction"
).value

});

localStorage.setItem(
"infractions",
JSON.stringify(infractions)
);

this.reset();

afficherInfractions();

});

function supprimerInfraction(index){

if(confirm(
"Supprimer cette infraction ?"
)){

infractions.splice(index,1);

localStorage.setItem(
"infractions",
JSON.stringify(infractions)
);

afficherInfractions();

}

}

afficherInfractions();

</script>

</body>
</html>
