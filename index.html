<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InspecteurBot RDC | Dashboard</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ZOOM FIX ================= */
body{
    transform: scale(0.98);
    transform-origin: top;
    background:#edf2f9;
}

/* ================= LAYOUT ================= */
.dashboard-layout{
    display:flex;
}

/* ================= SIDEBAR ================= */
.sidebar{
    width:260px;
    background:#041c5c;
    color:#fff;
    position:fixed;
    height:100%;
    overflow-y:auto;
}

/* ================= MAIN ================= */
.main-content{
    margin-left:260px;
    width:100%;
    padding:20px;
}

/* ================= FULL WIDTH SLIDER ================= */
.banner{
    width:100%;
    height:320px;
    position:relative;
    overflow:hidden;
    border-radius:20px;
    margin-bottom:10px;
}

.slider{
    width:100%;
    height:100%;
    position:absolute;
}

.slider img{
    width:100%;
    height:100%;
    object-fit:cover;
    position:absolute;
    opacity:0;
    transition:opacity 1s ease;
}

.slider img.active{
    opacity:1;
}

/* ================= MOTIVATION BAR ================= */
.motivation{
    background:#0b3d91;
    color:#fff;
    text-align:center;
    padding:10px;
    font-size:14px;
    margin-bottom:20px;
}

/* ================= QUICK ACCESS ================= */
.quick-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

/* ================= WHATSAPP NOTIF (SLIDE UP) ================= */
#notif-container{
    position:fixed;
    bottom:20px;
    right:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:9999;
}

.notif{
    background:#25D366;
    color:#fff;
    padding:10px 14px;
    border-radius:10px;
    font-size:13px;
    animation:slideUp 0.5s ease, fade 0.5s ease 4.5s forwards;
}

@keyframes slideUp{
    from{transform:translateY(100%);opacity:0;}
    to{transform:translateY(0);opacity:1;}
}

@keyframes fade{
    to{opacity:0;transform:translateY(50px);}
}

</style>

</head>

<body>

<div class="dashboard-layout">

<!-- SIDEBAR -->
<aside class="sidebar">
<h3 style="text-align:center;padding:15px;">MENU PRINCIPAL</h3>

<ul style="list-style:none;padding:0;">
<li><a href="#"><i class="fa fa-home"></i> Tableau de bord</a></li>
<li><a href="#"><i class="fa fa-building"></i> Entreprises</a></li>
<li><a href="#"><i class="fa fa-clipboard"></i> Inspections</a></li>
<li><a href="#"><i class="fa fa-triangle-exclamation"></i> Infractions</a></li>
<li><a href="#"><i class="fa fa-users"></i> Travailleurs</a></li>
<li><a href="#" style="color:red;"><i class="fa fa-power-off"></i> Déconnexion</a></li>
</ul>

</aside>

<!-- MAIN -->
<main class="main-content">

<!-- SLIDER FULL WIDTH -->
<section class="banner">

<div class="slider" id="slider">
<img src="images/photos_igt/1.jpg" class="active">
<img src="images/photos_igt/2.jpg">
<img src="images/photos_igt/3.jpg">
<img src="images/photos_igt/4.jpg">
<img src="images/photos_igt/5.jpg">
<img src="images/photos_igt/6.jpg">
<img src="images/photos_igt/7.jpg">
<img src="images/photos_igt/8.jpg">
<img src="images/photos_igt/9.jpg">
<img src="images/photos_igt/10.jpg">
<img src="images/photos_igt/11.jpg">
<img src="images/photos_igt/12.jpg">
<img src="images/photos_igt/13.jpg">
<img src="images/photos_igt/14.jpg">
<img src="images/photos_igt/15.jpg">
<img src="images/photos_igt/16.jpg">
<img src="images/photos_igt/17.jpg">
<img src="images/photos_igt/18.jpg">
<img src="images/photos_igt/19.jpg">
<img src="images/photos_igt/20.jpg">
</div>

</section>

<!-- MOTIVATION 40 PHRASES -->
<div class="motivation">
<span id="motivationText"></span>
</div>

<!-- QUICK ACCESS -->
<section>
<h2 style="text-align:center;">ACCÈS RAPIDE</h2>

<div class="quick-grid">

<div>Entreprises</div>
<div>Inspections</div>
<div>Infractions</div>
<div>PV</div>
<div>Travailleurs</div>
<div>Inspecteurs</div>

</div>

</section>

</main>

</div>

<!-- NOTIF -->
<div id="notif-container"></div>

<script>

/* SLIDER 10s */
let i = 0;
const slides = document.querySelectorAll("#slider img");

setInterval(()=>{
    slides[i].classList.remove("active");
    i = (i + 1) % slides.length;
    slides[i].classList.add("active");
},10000);

/* MOTIVATION 40 phrases */
const msg = Array.from({length:40},(_,i)=>"Motivation "+(i+1));

let m=0;
setInterval(()=>{
    document.getElementById("motivationText").innerText = msg[m];
    m=(m+1)%msg.length;
},5000);

/* WHATSAPP NOTIF */
const notif = ["Bienvenue 👋","Mission active","Inspection en cours","Rapport prêt"];

setInterval(()=>{
    const box=document.createElement("div");
    box.className="notif";
    box.innerText=notif[Math.floor(Math.random()*notif.length)];
    document.getElementById("notif-container").appendChild(box);
    setTimeout(()=>box.remove(),5000);
},10000);

</script>

</body>
                    </html>
