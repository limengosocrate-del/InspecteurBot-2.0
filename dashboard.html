<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InspecteurBot RDC | Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */
body{
    margin:0;
    font-family:Poppins;
    background:#edf2f9;
    transform:scale(0.98);
    transform-origin:top;
}

/* ================= LAYOUT SIDEBAR ================= */
.dashboard{
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:240px;
    background:#041c5c;
    color:white;
    min-height:100vh;
    position:fixed;
    left:0;
    top:0;
    overflow-y:auto;
    padding:10px 0;
}

.sidebar h3{
    text-align:center;
    margin:10px 0;
    font-size:14px;
}

.sidebar a{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 15px;
    color:white;
    text-decoration:none;
    font-size:14px;
    border-radius:6px;
    margin:3px 10px;
}

.sidebar a:hover{
    background:#0b52d6;
}

/* ================= MAIN ================= */
.main{
    margin-left:240px;
    width:100%;
}

/* ================= SLIDER (RÉDUIT) ================= */
.banner{
    width:100%;
    height:240px;
    overflow:hidden;
    position:relative;
}

.slider{
    width:100%;
    height:100%;
    position:absolute;
}

.slider img{
    width:100%;
    height:100%;
    object-fit:cover;
    position:absolute;
    opacity:0;
    transition:opacity 1s ease;
}

.slider img.active{opacity:1;}

/* ================= MOTIVATION ================= */
.motivation{
    background:#0b3d91;
    color:white;
    text-align:center;
    padding:8px;
    font-size:13px;
}

/* ================= QUICK ACCESS ================= */
.quick-section{
    padding:10px 15px;
    text-align:center;
}

.quick-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
    margin-top:10px;
}

.quick-card{
    background:white;
    padding:12px;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
    font-size:13px;
}

/* ================= NOTIF ================= */
#notif-container{
    position:fixed;
    bottom:15px;
    right:15px;
    display:flex;
    flex-direction:column;
    gap:8px;
}

.notif{
    background:#25D366;
    color:white;
    padding:8px 12px;
    border-radius:8px;
    font-size:12px;
    animation:slideUp .4s ease;
}

@keyframes slideUp{
    from{transform:translateY(100%);opacity:0;}
    to{transform:translateY(0);opacity:1;}
}

</style>
</head>

<body>

<div class="dashboard">

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">
<h3>MENU PRINCIPAL</h3>

<a href="#"><i class="fa fa-home"></i> Tableau de bord</a>
<a href="#"><i class="fa fa-building"></i> Entreprises</a>
<a href="#"><i class="fa fa-clipboard"></i> Inspections</a>
<a href="#"><i class="fa fa-triangle-exclamation"></i> Infractions</a>
<a href="#"><i class="fa fa-users"></i> Travailleurs</a>
<a href="#" style="color:#ff4d4d;"><i class="fa fa-power-off"></i> Déconnexion</a>

</div>

<!-- ================= MAIN ================= -->
<div class="main">

<!-- SLIDER -->
<section class="banner">
<div class="slider" id="slider">
<img src="images/photos_igt/1.jpg" class="active">
<img src="images/photos_igt/2.jpg">
<img src="images/photos_igt/3.jpg">
<img src="images/photos_igt/4.jpg">
<img src="images/photos_igt/5.jpg">
<img src="images/photos_igt/6.jpg">
<img src="images/photos_igt/7.jpg">
<img src="images/photos_igt/8.jpg">
<img src="images/photos_igt/9.jpg">
<img src="images/photos_igt/10.jpg">
<img src="images/photos_igt/11.jpg">
<img src="images/photos_igt/12.jpg">
<img src="images/photos_igt/13.jpg">
<img src="images/photos_igt/14.jpg">
<img src="images/photos_igt/15.jpg">
<img src="images/photos_igt/16.jpg">
<img src="images/photos_igt/17.jpg">
<img src="images/photos_igt/18.jpg">
<img src="images/photos_igt/19.jpg">
<img src="images/photos_igt/20.jpg">
</div>
</section>

<!-- MOTIVATION -->
<div class="motivation">
<span id="motivationText"></span>
</div>

<!-- QUICK ACCESS (SOUS DASHBOARD) -->
<section class="quick-section">

<h3>ACCÈS RAPIDE</h3>

<div class="quick-grid">
<div class="quick-card">Entreprises</div>
<div class="quick-card">Inspections</div>
<div class="quick-card">Infractions</div>
<div class="quick-card">PV</div>
<div class="quick-card">Travailleurs</div>
<div class="quick-card">Inspecteurs</div>
</div>

</section>

</div>
</div>

<!-- NOTIFS -->
<div id="notif-container"></div>

<script>

/* SLIDER */
let i = 0;
const slides = document.querySelectorAll("#slider img");

setInterval(()=>{
    slides[i].classList.remove("active");
    i = (i + 1) % slides.length;
    slides[i].classList.add("active");
},8000);

/* MOTIVATION 40 PHRASES */
const msg = Array.from({length:40},(_,i)=>
"Le travail construit la nation 🇨🇩 - Motivation "+(i+1)
);

let m = 0;
setInterval(()=>{
    document.getElementById("motivationText").innerText = msg[m];
    m = (m + 1) % msg.length;
},4000);

/* NOTIFS WHATSAPP */
const notif = ["Bienvenue 👋","Mission active","Inspection en cours","Rapport prêt"];

setInterval(()=>{
    const box=document.createElement("div");
    box.className="notif";
    box.innerText=notif[Math.floor(Math.random()*notif.length)];
    document.getElementById("notif-container").appendChild(box);
    setTimeout(()=>box.remove(),4000);
},9000);

</script>

</body>
</html>
