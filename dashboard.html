<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.2">
<title>InspecteurBot RDC</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

/* ================= GLOBAL (DEZOOM PAGE) ================= */
html, body{
    width:100%;
    overflow-x:hidden;
    font-family:Poppins, sans-serif;
    background:#edf2f9;
    transform:scale(0.98);
    transform-origin:top;
}

/* ================= LAYOUT ================= */
.dashboard-layout{
    display:flex;
}

/* ================= SIDEBAR ================= */
.sidebar{
    width:260px;
    background:#041c5c;
    color:white;
    min-height:100vh;
    position:fixed;
    left:0;
    top:0;
    overflow-y:auto;
}

/* ================= MAIN ================= */
.main-content{
    margin-left:260px;
    padding:15px;
}

/* ================= SLIDER RECTANGULAIRE FULL WIDTH ================= */
.banner{
    width:100%;
    height:280px;
    position:relative;
    overflow:hidden;
    border-radius:15px;
    margin-bottom:10px;
}

.slider{
    width:100%;
    height:100%;
    position:relative;
}

.slider img{
    width:100%;
    height:100%;
    object-fit:cover;
    position:absolute;
    opacity:0;
    transition:1s ease;
}

.slider img.active{
    opacity:1;
}

/* ================= MOTIVATION JUSTE SOUS SLIDER ================= */
.motivation-bar{
    background:#0b3d91;
    color:white;
    padding:10px;
    text-align:center;
    margin-bottom:15px;
    border-radius:10px;
}

/* ================= ACCÈS RAPIDE ================= */
.quick-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
}

/* ================= WHATSAPP NOTIF (MONTE) ================= */
#notif-container{
    position:fixed;
    bottom:20px;
    right:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:9999;
}

.notif{
    background:#25D366;
    color:white;
    padding:10px 14px;
    border-radius:12px;
    font-size:13px;
    animation:slideUp 0.5s ease, fade 0.5s ease 4.5s forwards;
}

@keyframes slideUp{
    from{transform:translateY(100px);opacity:0;}
    to{transform:translateY(0);opacity:1;}
}

@keyframes fade{
    to{opacity:0;transform:translateY(-20px);}
}

</style>
</head>

<body>

<div class="dashboard-layout">

<!-- SIDEBAR -->
<aside class="sidebar">
<h3 style="padding:15px;color:white;">MENU PRINCIPAL</h3>

<ul style="list-style:none;padding:0;">
<li><a href="#" style="color:white;display:block;padding:10px;">Tableau de bord</a></li>
<li><a href="#" style="color:white;display:block;padding:10px;">Entreprises</a></li>
<li><a href="#" style="color:white;display:block;padding:10px;">Inspections</a></li>
<li><a href="#" style="color:white;display:block;padding:10px;">Infractions</a></li>
<li><a href="#" style="color:white;display:block;padding:10px;">Travailleurs</a></li>
</ul>
</aside>

<!-- MAIN -->
<main class="main-content">

<!-- SLIDER FULL WIDTH RECTANGLE -->
<div class="banner">
<div class="slider" id="slider">

<img src="images/1.jpg" class="active">
<img src="images/2.jpg">
<img src="images/3.jpg">
<img src="images/4.jpg">
<img src="images/5.jpg">
<img src="images/6.jpg">
<img src="images/7.jpg">
<img src="images/8.jpg">
<img src="images/9.jpg">
<img src="images/10.jpg">
<img src="images/11.jpg">
<img src="images/12.jpg">
<img src="images/13.jpg">
<img src="images/14.jpg">
<img src="images/15.jpg">
<img src="images/16.jpg">
<img src="images/17.jpg">
<img src="images/18.jpg">
<img src="images/19.jpg">
<img src="images/20.jpg">

</div>
</div>

<!-- MOTIVATION (JUSTE SOUS SLIDER) -->
<div class="motivation-bar">
<span id="motivationText"></span>
</div>

<!-- ACCÈS RAPIDE -->
<section class="quick-grid">

<div>Entreprises</div>
<div>Inspections</div>
<div>Infractions</div>
<div>PV</div>

</section>

</main>
</div>

<!-- NOTIF -->
<div id="notif-container"></div>

<script>

/* SLIDER */
let i=0;
const slides=document.querySelectorAll(".slider img");

setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},10000);

/* 40 MOTIVATIONS */
const msgs=[
"Le travail construit la nation 🇨🇩",
"La discipline mène au succès",
"Inspecter protège les travailleurs",
"Justice et rigueur",
"L’avenir dépend du travail",
"Respect du code du travail",
"Courage et motivation",
"Chaque mission compte",
"Phrase 9","Phrase 10","Phrase 11","Phrase 12",
"Phrase 13","Phrase 14","Phrase 15","Phrase 16",
"Phrase 17","Phrase 18","Phrase 19","Phrase 20",
"Phrase 21","Phrase 22","Phrase 23","Phrase 24",
"Phrase 25","Phrase 26","Phrase 27","Phrase 28",
"Phrase 29","Phrase 30","Phrase 31","Phrase 32",
"Phrase 33","Phrase 34","Phrase 35","Phrase 36",
"Phrase 37","Phrase 38","Phrase 39","Phrase 40"
];

let m=0;
setInterval(()=>{
document.getElementById("motivationText").innerText=msgs[m];
m=(m+1)%msgs.length;
},8000);

/* WHATSAPP NOTIF MONTE */
const notif=["Bienvenue 👋","Mission active","Inspection en cours"];

setInterval(()=>{
const box=document.createElement("div");
box.className="notif";
box.innerText=notif[Math.floor(Math.random()*notif.length)];
document.getElementById("notif-container").appendChild(box);
setTimeout(()=>box.remove(),5000);
},10000);

</script>

</body>
    </html>
