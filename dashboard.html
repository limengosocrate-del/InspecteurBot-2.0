<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InspecteurBot RDC</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins;
}

body{
    background:#edf2f9;
}

/* ================= HEADER IMAGE ================= */
.header-img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:0 0 20px 20px;
}

/* ================= LOGO ================= */
.logo{
    width:80px;
    margin:auto;
    margin-top:-40px;
    background:white;
    border-radius:50%;
    padding:5px;
    display:block;
}

/* ================= TITLE ================= */
.title{
    text-align:center;
    margin-top:10px;
    font-weight:700;
    color:#041c5c;
    font-size:20px;
}

/* ================= MENU ================= */
.menu{
    padding:15px;
}

.menu h3{
    margin:15px 0;
    color:#041c5c;
    text-align:left;
    font-size:14px;
}

.menu a{
    display:flex;
    align-items:center;
    gap:12px;
    text-decoration:none;
    background:#fff;
    padding:14px;
    margin-bottom:10px;
    border-radius:12px;
    color:#041c5c;
    font-weight:500;
    box-shadow:0 5px 12px rgba(0,0,0,0.05);
}

.menu a i{
    width:20px;
    color:#0b52d6;
}

.menu a.active{
    background:#0b52d6;
    color:white;
}

.menu a.active i{
    color:white;
}

/* ================= MOTIVATION ================= */
.motivation{
    margin:10px 15px;
    background:#0b3d91;
    color:white;
    padding:10px;
    border-radius:12px;
    text-align:center;
    font-size:13px;
}

/* ================= ACCÈS RAPIDE ================= */
.quick{
    padding:15px;
}

.quick h3{
    text-align:center;
    margin-bottom:10px;
    color:#041c5c;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.card{
    background:white;
    padding:15px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 12px rgba(0,0,0,0.06);
}

.card i{
    font-size:22px;
    color:#0b52d6;
    margin-bottom:8px;
}

/* ================= NOTIF ================= */
#notif{
    position:fixed;
    bottom:15px;
    right:15px;
    display:flex;
    flex-direction:column;
    gap:8px;
}

.msg{
    background:#25D366;
    color:white;
    padding:8px 12px;
    border-radius:10px;
    font-size:12px;
    animation:up .4s ease;
}

@keyframes up{
    from{transform:translateY(50px);opacity:0;}
    to{transform:translateY(0);opacity:1;}
}

</style>
</head>

<body>

<!-- IMAGE HEADER -->
<img src="images/photos_igt/1.jpg" class="header-img">

<!-- LOGO -->
<img src="images/logo-igt.png" class="logo">

<!-- TITLE -->
<div class="title">MENU PRINCIPAL</div>

<!-- MOTIVATION -->
<div class="motivation">
<span id="motivationText">Le travail construit la nation 🇨🇩</span>
</div>

<!-- MENU -->
<div class="menu">

<h3>MENU PRINCIPAL</h3>

<a class="active" href="#"><i class="fa fa-home"></i> Tableau de bord</a>
<a href="#"><i class="fa fa-building"></i> Entreprises</a>
<a href="#"><i class="fa fa-clipboard"></i> Procès-Verbaux</a>
<a href="#"><i class="fa fa-scale-balanced"></i> Code du Travail</a>
<a href="#"><i class="fa fa-triangle-exclamation"></i> Infractions</a>

</div>

<!-- ACCÈS RAPIDE -->
<div class="quick">

<h3>ACCÈS RAPIDE</h3>

<div class="grid">

<div class="card"><i class="fa fa-building"></i><p>Entreprises</p></div>
<div class="card"><i class="fa fa-clipboard"></i><p>Inspections</p></div>
<div class="card"><i class="fa fa-triangle-exclamation"></i><p>Infractions</p></div>
<div class="card"><i class="fa fa-users"></i><p>Travailleurs</p></div>

</div>

</div>

<!-- NOTIF -->
<div id="notif"></div>

<script>

/* 40 MOTIVATIONS */
const msg = Array.from({length:40},(_,i)=>
"Le travail construit la nation 🇨🇩 - Motivation "+(i+1)
);

let m=0;
setInterval(()=>{
    document.getElementById("motivationText").innerText = msg[m];
    m=(m+1)%msg.length;
},4000);

/* NOTIF WHATSAPP */
const notif = ["Bienvenue 👋","Inspection active","Rapport prêt","Mission en cours"];

setInterval(()=>{
    let box=document.createElement("div");
    box.className="msg";
    box.innerText=notif[Math.floor(Math.random()*notif.length)];
    document.getElementById("notif").appendChild(box);
    setTimeout(()=>box.remove(),4000);
},8000);

</script>

</body>
    </html>
