<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InspecteurBot RDC | Dashboard</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ================= RESET ZOOM ================= */
body{
    margin:0;
    padding:0;
    overflow-x:hidden;
}

/* ================= LAYOUT ================= */
.dashboard-layout{
    display:flex;
    min-height:100vh;
}

/* ================= SIDEBAR ================= */
.sidebar{
    width:260px;
    background:#041c5c;
    color:#fff;
    position:fixed;
    height:100%;
    overflow-y:auto;
}

/* ================= MAIN ================= */
.main-content{
    flex:1;
    margin-left:260px;
    padding:15px;
}

/* ================= SLIDER FULL WIDTH RECTANGLE ================= */
.banner{
    width:100%;
    height:320px; /* RECTANGLE */
    position:relative;
    overflow:hidden;
    border-radius:18px;
    margin-bottom:10px;
}

.slider{
    width:100%;
    height:100%;
    position:absolute;
}

.slider img{
    width:100%;
    height:100%;
    object-fit:cover;
    position:absolute;
    opacity:0;
    transition:opacity 1s ease;
}

.slider img.active{
    opacity:1;
}

/* ================= WHATSAPP NOTIF (MONTE DU BAS VERS HAUT) ================= */
#notif-container{
    position:fixed;
    bottom:20px;
    right:20px;
    display:flex;
    flex-direction:column;
    gap:8px;
    z-index:9999;
}

.notif{
    background:#25D366;
    color:white;
    padding:10px 14px;
    border-radius:10px;
    font-size:13px;
    animation:slideUp 0.5s ease, fade 0.5s ease 4.5s forwards;
}

/* MONTE */
@keyframes slideUp{
    from{transform:translateY(120%);opacity:0;}
    to{transform:translateY(0);opacity:1;}
}

@keyframes fade{
    to{opacity:0;transform:translateY(120%);}
}

/* ================= MOTIVATION SOUS SLIDER ================= */
.motivation-bar{
    background:#0b3d91;
    color:white;
    text-align:center;
    padding:12px;
    font-size:14px;
    margin-bottom:15px;
}

/* ================= ACCÈS RAPIDE ================= */
.quick-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
}

.quick-card{
    background:#fff;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

/* ================= RESPONSIVE ================= */
@media(max-width:768px){
    .sidebar{
        position:relative;
        width:100%;
    }
    .main-content{
        margin-left:0;
    }
    .banner{
        height:220px;
    }
}

</style>
</head>

<body>

<div class="dashboard-layout">

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar">
    <div style="text-align:center;padding:15px;">
        <h3>MENU PRINCIPAL</h3>
    </div>

    <ul style="list-style:none;padding:0;">
        <li><a href="#">Tableau de bord</a></li>
        <li><a href="#">Entreprises</a></li>
        <li><a href="#">Inspections</a></li>
        <li><a href="#">Infractions</a></li>
        <li><a href="#">Travailleurs</a></li>
        <li><a href="#">Déconnexion</a></li>
    </ul>
</aside>

<!-- ================= MAIN ================= -->
<main class="main-content">

<!-- ================= SLIDER ================= -->
<section class="banner">

<div class="slider" id="slider">
<img src="images/photos_igt/1.jpg" class="active">
<img src="images/photos_igt/2.jpg">
<img src="images/photos_igt/3.jpg">
<img src="images/photos_igt/4.jpg">
<img src="images/photos_igt/5.jpg">
<img src="images/photos_igt/6.jpg">
<img src="images/photos_igt/7.jpg">
<img src="images/photos_igt/8.jpg">
<img src="images/photos_igt/9.jpg">
<img src="images/photos_igt/10.jpg">
<img src="images/photos_igt/11.jpg">
<img src="images/photos_igt/12.jpg">
<img src="images/photos_igt/13.jpg">
<img src="images/photos_igt/14.jpg">
<img src="images/photos_igt/15.jpg">
<img src="images/photos_igt/16.jpg">
<img src="images/photos_igt/17.jpg">
<img src="images/photos_igt/18.jpg">
<img src="images/photos_igt/19.jpg">
<img src="images/photos_igt/20.jpg">
</div>

</section>

<!-- ================= MOTIVATION 40 PHRASES ================= -->
<div class="motivation-bar">
<span id="motivationText"></span>
</div>

<!-- ================= ACCÈS RAPIDE ================= -->
<section class="quick-section">

<div class="quick-grid">

<div class="quick-card">Entreprises</div>
<div class="quick-card">Inspections</div>
<div class="quick-card">Infractions</div>
<div class="quick-card">PV</div>
<div class="quick-card">Travailleurs</div>
<div class="quick-card">Inspecteurs</div>
<div class="quick-card">Contrôleurs</div>

</div>

</section>

</main>
</div>

<!-- ================= NOTIFICATIONS WHATSAPP ================= -->
<div id="notif-container"></div>

<script>

/* ================= SLIDER ================= */
let i = 0;
const slides = document.querySelectorAll("#slider img");

setInterval(()=>{
    slides[i].classList.remove("active");
    i = (i + 1) % slides.length;
    slides[i].classList.add("active");
}, 10000);

/* ================= 40 MOTIVATIONS ================= */
const msgs = [
"Le travail construit la nation 🇨🇩",
"La discipline mène au succès",
"Inspecter c’est protéger",
"Chaque mission compte",
"Justice sociale pour tous",
"L’avenir dépend du travail",
"Respect du code du travail",
"Motivation et courage",
"Organisation et rigueur",
"Un bon inspecteur change tout",
"Travail = réussite",
"Confiance et discipline",
"Contrôle efficace",
"Sécurité avant tout",
"Respect des normes",
"Engagement total",
"Travail bien fait",
"Professionnalisme",
"Fiabilité",
"Responsabilité",
"Excellence",
"Détermination",
"Focus",
"Performance",
"Éthique",
"Force du travail",
"Vision",
"Leadership",
"Respect",
"Justice",
"Travail d’équipe",
"Progrès",
"Succès",
"Croissance",
"Stabilité",
"Dévouement",
"Impact positif",
"Transformation",
"Innovation",
"Fierté nationale"
];

let m = 0;

setInterval(()=>{
    document.getElementById("motivationText").innerText = msgs[m];
    m = (m + 1) % msgs.length;
}, 4000);

/* ================= WHATSAPP NOTIF ================= */
function notif(msg){
    const box = document.createElement("div");
    box.className="notif";
    box.innerText=msg;
    document.getElementById("notif-container").appendChild(box);

    setTimeout(()=>box.remove(),5000);
}

setInterval(()=>{
    notif("Bienvenue Inspecteur 👋");
},10000);

</script>

</body>
</html>
