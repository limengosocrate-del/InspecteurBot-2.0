<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InspecteurBot RDC PRO</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL (DEZOOM PAGE) ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins;
}

body{
    background:#eef3fb;
    transform:scale(0.95); /* 🔥 DEZOOM GLOBAL */
    transform-origin:top;
}

/* ================= LAYOUT ================= */
.dashboard{
    display:flex;
}

/* ================= SIDEBAR ================= */
.sidebar{
    width:260px;
    height:100vh;
    position:fixed;
    background:#061a44;
    color:white;
    padding:15px;
}

.sidebar img{
    width:100%;
    border-radius:12px;
    margin-bottom:10px;
}

.sidebar ul{
    list-style:none;
}

.sidebar ul li a{
    display:block;
    padding:12px;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

.sidebar ul li a:hover{
    background:#0b4bd4;
}

/* ================= MAIN ================= */
.main{
    margin-left:260px;
    width:100%;
}

/* ================= SLIDER FULL WIDTH ================= */
.slider{
    width:100%;
    height:450px;
    position:relative;
    overflow:hidden;
}

.slider img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover; /* 🔥 propre sans déformation */
    opacity:0;
    transition:1s;
}

.slider img.active{
    opacity:1;
}

/* ================= MOTIVATION BAR ================= */
.motivation{
    background:#0b4bd4;
    color:white;
    text-align:center;
    padding:12px;
    font-size:15px;
}

/* ================= STATS ================= */
.stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

/* ================= QUICK ACCESS ================= */
.quick{
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

.box{
    background:white;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

/* ================= NOTIF WHATSAPP ================= */
#notif{
    position:fixed;
    bottom:20px;
    right:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.note{
    background:#25D366;
    color:white;
    padding:12px;
    border-radius:10px;
    font-size:13px;
    animation:slideUp 0.5s ease, fade 5s forwards;
}

@keyframes slideUp{
    from{transform:translateY(30px);opacity:0;}
    to{transform:translateY(0);opacity:1;}
}

@keyframes fade{
    80%{opacity:1;}
    100%{opacity:0;}
}

/* ================= MOTIVATION LIST ================= */
.motivation-list{
    padding:15px;
    background:#ffffff;
    margin:10px;
    border-radius:15px;
    max-height:120px;
    overflow:hidden;
}

</style>
</head>

<body>

<div class="dashboard">

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">
<img src="images/photos_igt/1.jpg">

<ul>
<li><a href="#">Tableau de bord</a></li>
<li><a href="#">Entreprises</a></li>
<li><a href="#">Inspections</a></li>
<li><a href="#">Infractions</a></li>
<li><a href="#">Travailleurs</a></li>
</ul>

</div>

<!-- ================= MAIN ================= -->
<div class="main">

<!-- SLIDER FULL WIDTH -->
<div class="slider">
<img src="images/photos_igt/1.jpg" class="active">
<img src="images/photos_igt/2.jpg">
<img src="images/photos_igt/3.jpg">
<img src="images/photos_igt/4.jpg">
<img src="images/photos_igt/5.jpg">
</div>

<!-- WHATSAPP BIENVENUE -->
<div id="notif"></div>

<!-- MOTIVATION BAR -->
<div class="motivation" id="motivation">
Bienvenue Inspecteur 👋
</div>

<!-- 40 PHRASES SOUS SLIDER -->
<div class="motivation-list" id="motivationList">
</div>

<!-- STATS -->
<div class="stats">
<div class="card">Entreprises<br><b>1248</b></div>
<div class="card">Inspections<br><b>532</b></div>
<div class="card">Infractions<br><b>189</b></div>
<div class="card">Travailleurs<br><b>12845</b></div>
</div>

<!-- QUICK ACCESS -->
<div class="quick">
<div class="grid">
<div class="box">Entreprises</div>
<div class="box">Inspections</div>
<div class="box">Infractions</div>
<div class="box">PV</div>
</div>
</div>

</div>
</div>

<script>

/* ================= SLIDER ================= */
let i=0;
const slides=document.querySelectorAll(".slider img");

setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},4000);

/* ================= WHATSAPP WELCOME ================= */
function welcome(){
let n=document.createElement("div");
n.className="note";
n.innerText="👋 Bienvenue Inspecteur sur InspecteurBot RDC";
document.getElementById("notif").appendChild(n);
setTimeout(()=>n.remove(),6000);
}
welcome();

/* ================= MOTIVATION ROTATION ================= */
const msgs=[
"Le travail construit la nation",
"La discipline mène au succès",
"Inspecter protège les travailleurs",
"Respect du code du travail",
"Justice et rigueur",
"Chaque mission compte",
"Motivation 7","Motivation 8","Motivation 9","Motivation 10",
"Motivation 11","Motivation 12","Motivation 13","Motivation 14","Motivation 15",
"Motivation 16","Motivation 17","Motivation 18","Motivation 19","Motivation 20",
"Motivation 21","Motivation 22","Motivation 23","Motivation 24","Motivation 25",
"Motivation 26","Motivation 27","Motivation 28","Motivation 29","Motivation 30",
"Motivation 31","Motivation 32","Motivation 33","Motivation 34","Motivation 35",
"Motivation 36","Motivation 37","Motivation 38","Motivation 39","Motivation 40"
];

let m=0;
setInterval(()=>{
document.getElementById("motivation").innerText=msgs[m];
document.getElementById("motivationList").innerText=msgs.join(" • ");
m=(m+1)%msgs.length;
},4000);

</script>

</body>
    </html>
