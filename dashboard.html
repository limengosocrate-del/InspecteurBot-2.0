<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InspecteurBot RDC PRO MAX</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#eef3fb;
overflow-x:hidden;
}

/* ================= LAYOUT ================= */
.dashboard{
display:flex;
}

/* ================= SIDEBAR ================= */
.sidebar{
width:260px;
height:100vh;
position:fixed;
background:#061a44;
color:white;
padding:15px;
overflow-y:auto;
}

.sidebar img{
width:100%;
border-radius:12px;
margin-bottom:10px;
}

.sidebar ul{
list-style:none;
}

.sidebar ul li a{
display:flex;
gap:10px;
padding:12px;
color:white;
text-decoration:none;
border-radius:8px;
}

.sidebar ul li a:hover{
background:#0b4bd4;
}

/* ================= MAIN ================= */
.main{
margin-left:260px;
width:100%;
}

/* ================= SLIDER FULL WIDTH FIX ================= */
.slider{
position:relative;
width:100%;
height:480px; /* 🔥 plus grand */
overflow:hidden;
border-radius:0;
}

.slider img{
position:absolute;
width:100%;
height:100%;
object-fit:contain; /* 🔥 STOP ZOOM */
background:#061a44;
opacity:0;
transition:1s;
}

.slider img.active{
opacity:1;
}

/* overlay pro */
.slider::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.7));
z-index:2;
}

/* ================= STATS ================= */
.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* ================= MOTIVATION ================= */
.motivation{
background:#0b4bd4;
color:white;
text-align:center;
padding:10px;
margin:10px;
border-radius:10px;
}

/* ================= ACCES RAPIDE ================= */
.quick{
padding:20px;
}

.quick h2{
text-align:center;
margin-bottom:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

.box{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
}

/* ================= NOTIFICATIONS ================= */
#notif{
position:fixed;
bottom:15px;
right:15px;
z-index:9999;
}

.note{
background:#25D366;
padding:10px;
border-radius:10px;
color:white;
margin-top:10px;
animation:fade 5s forwards;
}

@keyframes fade{
0%{transform:translateX(100%);opacity:0;}
10%{transform:translateX(0);opacity:1;}
100%{opacity:0;transform:translateX(100%);}
}

/* ================= RESPONSIVE ================= */
@media(max-width:900px){
.sidebar{display:none;}
.main{margin-left:0;}
.stats{grid-template-columns:repeat(2,1fr);}
.grid{grid-template-columns:repeat(2,1fr);}
}

</style>
</head>

<body>

<div class="dashboard">

<!-- SIDEBAR -->
<div class="sidebar">

<img src="images/photos_igt/1.jpg">

<ul>
<li><a href="#"><i class="fa fa-home"></i> Tableau de bord</a></li>
<li><a href="#">Entreprises</a></li>
<li><a href="#">Inspections</a></li>
<li><a href="#">Infractions</a></li>
<li><a href="#">Travailleurs</a></li>
</ul>

</div>

<!-- MAIN -->
<div class="main">

<!-- SLIDER FULL WIDTH -->
<div class="slider">
<img src="images/photos_igt/1.jpg" class="active">
<img src="images/photos_igt/2.jpg">
<img src="images/photos_igt/3.jpg">
<img src="images/photos_igt/4.jpg">
<img src="images/photos_igt/5.jpg">
<img src="images/photos_igt/6.jpg">
<img src="images/photos_igt/7.jpg">
<img src="images/photos_igt/8.jpg">
<img src="images/photos_igt/9.jpg">
<img src="images/photos_igt/10.jpg">
<img src="images/photos_igt/11.jpg">
<img src="images/photos_igt/12.jpg">
<img src="images/photos_igt/13.jpg">
<img src="images/photos_igt/14.jpg">
<img src="images/photos_igt/15.jpg">
<img src="images/photos_igt/16.jpg">
<img src="images/photos_igt/17.jpg">
<img src="images/photos_igt/18.jpg">
<img src="images/photos_igt/19.jpg">
<img src="images/photos_igt/20.jpg">
</div>

<!-- STATS -->
<div class="stats">
<div class="card">Entreprises<br><b>1248</b></div>
<div class="card">Inspections<br><b>532</b></div>
<div class="card">Infractions<br><b>189</b></div>
<div class="card">Travailleurs<br><b>12845</b></div>
</div>

<!-- MOTIVATION -->
<div class="motivation" id="motivation">
Le travail construit la nation
</div>

<!-- ACCES RAPIDE -->
<div class="quick">
<h2>ACCÈS RAPIDE</h2>
<div class="grid">
<div class="box">Entreprises</div>
<div class="box">Inspections</div>
<div class="box">Infractions</div>
<div class="box">Travailleurs</div>
</div>
</div>

</div>
</div>

<!-- NOTIF -->
<div id="notif"></div>

<script>

/* SLIDER 10s */
let i=0;
const slides=document.querySelectorAll(".slider img");

setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},10000);

/* MOTIVATION */
const msg=[
"Le travail construit la nation",
"La discipline mène au succès",
"Inspecter protège les travailleurs",
"Respect du travail"
];

let m=0;
setInterval(()=>{
document.getElementById("motivation").innerText=msg[m];
m=(m+1)%msg.length;
},6000);

/* NOTIFICATIONS */
setInterval(()=>{
let n=document.createElement("div");
n.className="note";
n.innerText="Nouvelle activité détectée";
document.getElementById("notif").appendChild(n);
setTimeout(()=>n.remove(),5000);
},8000);

</script>

</body>
</html>
