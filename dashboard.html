<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InspecteurBot RDC | Dashboard</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
body{
    margin:0;
    font-family:Poppins;
    background:#edf2f9;
}

/* ===== SLIDER FULL WIDTH ===== */
.banner{
    width:100%;
    height:320px;
    position:relative;
    overflow:hidden;
}

.slider{
    width:100%;
    height:100%;
    position:absolute;
}

.slider img{
    width:100%;
    height:100%;
    object-fit:cover;
    position:absolute;
    opacity:0;
    transition:opacity 1s ease;
}

.slider img.active{
    opacity:1;
}

/* ===== MOTIVATION ===== */
.motivation{
    background:#0b3d91;
    color:white;
    text-align:center;
    padding:12px;
    font-size:14px;
}

/* ===== MENU INDEX (SOUS SLIDER) ===== */
.menu-index{
    background:#041c5c;
    padding:15px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
}

.menu-index a{
    color:white;
    text-decoration:none;
    padding:10px 15px;
    border-radius:8px;
    background:rgba(255,255,255,0.1);
    font-size:14px;
}

.menu-index a:hover{
    background:#0b52d6;
}

/* ===== ACCES RAPIDE ===== */
.quick-section{
    padding:20px;
    text-align:center;
}

.quick-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:15px;
    margin-top:15px;
}

.quick-card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* ===== NOTIFICATIONS ===== */
#notif-container{
    position:fixed;
    bottom:20px;
    right:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.notif{
    background:#25D366;
    color:white;
    padding:10px;
    border-radius:10px;
    font-size:13px;
    animation:slideUp 0.5s ease;
}

@keyframes slideUp{
    from{transform:translateY(100%);opacity:0;}
    to{transform:translateY(0);opacity:1;}
}

</style>
</head>

<body>

<!-- ================= SLIDER ================= -->
<section class="banner">

<div class="slider" id="slider">
<img src="images/photos_igt/1.jpg" class="active">
<img src="images/photos_igt/2.jpg">
<img src="images/photos_igt/3.jpg">
<img src="images/photos_igt/4.jpg">
<img src="images/photos_igt/5.jpg">
<img src="images/photos_igt/6.jpg">
<img src="images/photos_igt/7.jpg">
<img src="images/photos_igt/8.jpg">
<img src="images/photos_igt/9.jpg">
<img src="images/photos_igt/10.jpg">
<img src="images/photos_igt/11.jpg">
<img src="images/photos_igt/12.jpg">
<img src="images/photos_igt/13.jpg">
<img src="images/photos_igt/14.jpg">
<img src="images/photos_igt/15.jpg">
<img src="images/photos_igt/16.jpg">
<img src="images/photos_igt/17.jpg">
<img src="images/photos_igt/18.jpg">
<img src="images/photos_igt/19.jpg">
<img src="images/photos_igt/20.jpg">
</div>

</section>

<!-- ================= MOTIVATION ================= -->
<div class="motivation">
<span id="motivationText"></span>
</div>

<!-- ================= MENU INDEX (DEPLACÉ ICI) ================= -->
<nav class="menu-index">

<a href="#"><i class="fa fa-home"></i> Tableau de bord</a>
<a href="#"><i class="fa fa-building"></i> Entreprises</a>
<a href="#"><i class="fa fa-clipboard"></i> Inspections</a>
<a href="#"><i class="fa fa-triangle-exclamation"></i> Infractions</a>
<a href="#"><i class="fa fa-users"></i> Travailleurs</a>
<a href="#" style="background:red;"><i class="fa fa-power-off"></i> Déconnexion</a>

</nav>

<!-- ================= ACCES RAPIDE ================= -->
<section class="quick-section">

<h2>ACCÈS RAPIDE</h2>

<div class="quick-grid">

<div class="quick-card">Entreprises</div>
<div class="quick-card">Inspections</div>
<div class="quick-card">Infractions</div>
<div class="quick-card">PV</div>
<div class="quick-card">Travailleurs</div>
<div class="quick-card">Inspecteurs</div>

</div>

</section>

<!-- ================= NOTIFS ================= -->
<div id="notif-container"></div>

<script>

/* SLIDER */
let i = 0;
const slides = document.querySelectorAll("#slider img");

setInterval(()=>{
    slides[i].classList.remove("active");
    i = (i + 1) % slides.length;
    slides[i].classList.add("active");
},10000);

/* MOTIVATION 40 PHRASES */
const msg = Array.from({length:40},(_,i)=>
"Le travail construit la nation 🇨🇩 - Motivation "+(i+1)
);

let m = 0;
setInterval(()=>{
    document.getElementById("motivationText").innerText = msg[m];
    m = (m + 1) % msg.length;
},5000);

/* NOTIFICATIONS */
const notif = ["Bienvenue 👋","Mission active","Inspection en cours","Rapport prêt"];

setInterval(()=>{
    const box=document.createElement("div");
    box.className="notif";
    box.innerText=notif[Math.floor(Math.random()*notif.length)];
    document.getElementById("notif-container").appendChild(box);
    setTimeout(()=>box.remove(),5000);
},10000);

</script>

</body>
</html>
