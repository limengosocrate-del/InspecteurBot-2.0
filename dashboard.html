<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InspecteurBot RDC | Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins;
}

body{
    background:#edf2f9;
    transform:scale(0.97);
    transform-origin:top;
}

/* ================= SLIDER RÉDUIT ================= */
.banner{
    width:100%;
    height:220px; /* ↓ réduit */
    position:relative;
    overflow:hidden;
}

.slider{
    width:100%;
    height:100%;
    position:absolute;
}

.slider img{
    width:100%;
    height:100%;
    object-fit:cover;
    position:absolute;
    opacity:0;
    transition:opacity 1s ease;
}

.slider img.active{
    opacity:1;
}

/* ================= MOTIVATION ================= */
.motivation{
    background:#0b3d91;
    color:white;
    text-align:center;
    padding:8px;
    font-size:13px;
}

/* ================= MENU INDEX SOUS SLIDER ================= */
.menu-index{
    background:#041c5c;
    padding:8px; /* ↓ réduit */
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:6px;
}

.menu-index a{
    color:white;
    text-decoration:none;
    padding:7px 10px;
    border-radius:6px;
    background:rgba(255,255,255,0.12);
    font-size:13px;
}

.menu-index a:hover{
    background:#0b52d6;
}

/* ================= ACCÈS RAPIDE ================= */
.quick-section{
    padding:12px; /* ↓ réduit */
    text-align:center;
}

.quick-section h2{
    font-size:18px;
    margin-bottom:10px;
}

.quick-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
}

.quick-card{
    background:white;
    padding:14px; /* ↓ réduit */
    border-radius:12px;
    box-shadow:0 5px 12px rgba(0,0,0,0.08);
    font-size:13px;
}

/* ================= NOTIFS ================= */
#notif-container{
    position:fixed;
    bottom:15px;
    right:15px;
    display:flex;
    flex-direction:column;
    gap:8px;
    z-index:9999;
}

.notif{
    background:#25D366;
    color:white;
    padding:8px 10px;
    border-radius:8px;
    font-size:12px;
    animation:slideUp .5s ease;
}

@keyframes slideUp{
    from{transform:translateY(100%);opacity:0;}
    to{transform:translateY(0);opacity:1;}
}

</style>
</head>

<body>

<!-- ================= SLIDER ================= -->
<section class="banner">

<div class="slider" id="slider">
<img src="images/photos_igt/1.jpg" class="active">
<img src="images/photos_igt/2.jpg">
<img src="images/photos_igt/3.jpg">
<img src="images/photos_igt/4.jpg">
<img src="images/photos_igt/5.jpg">
<img src="images/photos_igt/6.jpg">
<img src="images/photos_igt/7.jpg">
<img src="images/photos_igt/8.jpg">
<img src="images/photos_igt/9.jpg">
<img src="images/photos_igt/10.jpg">
<img src="images/photos_igt/11.jpg">
<img src="images/photos_igt/12.jpg">
<img src="images/photos_igt/13.jpg">
<img src="images/photos_igt/14.jpg">
<img src="images/photos_igt/15.jpg">
<img src="images/photos_igt/16.jpg">
<img src="images/photos_igt/17.jpg">
<img src="images/photos_igt/18.jpg">
<img src="images/photos_igt/19.jpg">
<img src="images/photos_igt/20.jpg">
</div>

</section>

<!-- ================= MOTIVATION ================= -->
<div class="motivation">
<span id="motivationText"></span>
</div>

<!-- ================= MENU INDEX ================= -->
<nav class="menu-index">

<a href="#"><i class="fa fa-home"></i> Dashboard</a>
<a href="#"><i class="fa fa-building"></i> Entreprises</a>
<a href="#"><i class="fa fa-clipboard"></i> Inspections</a>
<a href="#"><i class="fa fa-triangle-exclamation"></i> Infractions</a>
<a href="#"><i class="fa fa-users"></i> Travailleurs</a>
<a href="#" style="background:#e11d48;"><i class="fa fa-power-off"></i> Déconnexion</a>

</nav>

<!-- ================= ACCÈS RAPIDE ================= -->
<section class="quick-section">

<h2>ACCÈS RAPIDE</h2>

<div class="quick-grid">

<div class="quick-card"><i class="fa fa-building"></i> Entreprises</div>
<div class="quick-card"><i class="fa fa-clipboard"></i> Inspections</div>
<div class="quick-card"><i class="fa fa-triangle-exclamation"></i> Infractions</div>
<div class="quick-card"><i class="fa fa-file"></i> PV</div>
<div class="quick-card"><i class="fa fa-users"></i> Travailleurs</div>
<div class="quick-card"><i class="fa fa-user-shield"></i> Inspecteurs</div>

</div>

</section>

<!-- ================= NOTIFICATIONS ================= -->
<div id="notif-container"></div>

<script>

/* SLIDER */
let i = 0;
const slides = document.querySelectorAll("#slider img");

setInterval(()=>{
    slides[i].classList.remove("active");
    i = (i + 1) % slides.length;
    slides[i].classList.add("active");
},9000);

/* 40 MOTIVATIONS */
const msg = Array.from({length:40},(_,i)=>
"Le travail construit la nation 🇨🇩 • Motivation "+(i+1)
);

let m = 0;
setInterval(()=>{
    document.getElementById("motivationText").innerText = msg[m];
    m = (m + 1) % msg.length;
},4000);

/* NOTIFS WHATSAPP */
const notif = ["Bienvenue 👋","Mission active","Inspection en cours","Rapport prêt"];

setInterval(()=>{
    const box = document.createElement("div");
    box.className = "notif";
    box.innerText = notif[Math.floor(Math.random()*notif.length)];
    document.getElementById("notif-container").appendChild(box);
    setTimeout(()=>box.remove(),4000);
},8000);

</script>

</body>
</html>
