<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InspecteurBot RDC | Dashboard</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

/* ================= GLOBAL ================= */
body{
    margin:0;
    background:#edf2f9;
    font-family:Poppins, sans-serif;
}

/* ================= LAYOUT ================= */
.dashboard-layout{
    display:flex;
}

/* ================= SIDEBAR (réduit) ================= */
.sidebar{
    width:240px;
    background:#041c5c;
    color:#fff;
    position:fixed;
    height:100%;
    overflow-y:auto;
    padding:10px;
}

.sidebar h3{
    font-size:14px;
    padding:10px;
}

.sidebar ul li a{
    padding:10px 12px;
    font-size:13px;
    display:flex;
    gap:10px;
}

/* ================= MAIN ================= */
.main-content{
    margin-left:240px;
    width:100%;
    padding:12px;
}

/* ================= SLIDER (moins haut) ================= */
.banner{
    width:100%;
    height:200px; /* 🔥 réduit */
    position:relative;
    overflow:hidden;
    border-radius:15px;
    margin-bottom:8px;
}

.slider img{
    width:100%;
    height:100%;
    object-fit:cover;
    position:absolute;
    opacity:0;
    transition:opacity 1s ease;
}

.slider img.active{
    opacity:1;
}

/* ================= MOTIVATION ================= */
.motivation{
    background:#0b3d91;
    color:#fff;
    text-align:center;
    padding:6px;
    font-size:13px;
    margin-bottom:10px;
    border-radius:10px;
}

/* ================= STATS + QUICK ACCESS ================= */
.stats-grid,
.quick-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:10px; /* 🔥 réduit */
}

/* cards plus compactes */
.quick-grid div{
    background:#fff;
    padding:10px;
    border-radius:12px;
    text-align:center;
    font-size:13px;
}

/* ================= NOTIF WHATSAPP ================= */
#notif-container{
    position:fixed;
    bottom:10px;
    right:10px;
    display:flex;
    flex-direction:column;
    gap:6px;
}

.notif{
    background:#25D366;
    color:#fff;
    padding:8px 10px;
    border-radius:8px;
    font-size:12px;
    animation:slideUp .4s ease, fade .5s ease 4.5s forwards;
}

@keyframes slideUp{
    from{transform:translateY(100%);opacity:0;}
    to{transform:translateY(0);opacity:1;}
}

@keyframes fade{
    to{opacity:0;}
}

</style>

</head>

<body>

<div class="dashboard-layout">

<!-- SIDEBAR -->
<aside class="sidebar">

<h3>MENU PRINCIPAL</h3>

<ul style="list-style:none;padding:0;margin:0;">
<li><a href="#"><i class="fa fa-home"></i> Tableau</a></li>
<li><a href="#"><i class="fa fa-building"></i> Entreprises</a></li>
<li><a href="#"><i class="fa fa-clipboard"></i> Inspections</a></li>
<li><a href="#"><i class="fa fa-triangle-exclamation"></i> Infractions</a></li>
<li><a href="#"><i class="fa fa-users"></i> Travailleurs</a></li>
<li><a href="#" style="color:red;"><i class="fa fa-power-off"></i> Déconnexion</a></li>
</ul>

</aside>

<!-- MAIN -->
<main class="main-content">

<!-- SLIDER -->
<section class="banner">
<div class="slider" id="slider">
<img src="images/photos_igt/1.jpg" class="active">
<img src="images/photos_igt/2.jpg">
<img src="images/photos_igt/3.jpg">
<img src="images/photos_igt/4.jpg">
<img src="images/photos_igt/5.jpg">
<img src="images/photos_igt/6.jpg">
<img src="images/photos_igt/7.jpg">
<img src="images/photos_igt/8.jpg">
<img src="images/photos_igt/9.jpg">
<img src="images/photos_igt/10.jpg">
<img src="images/photos_igt/11.jpg">
<img src="images/photos_igt/12.jpg">
<img src="images/photos_igt/13.jpg">
<img src="images/photos_igt/14.jpg">
<img src="images/photos_igt/15.jpg">
<img src="images/photos_igt/16.jpg">
<img src="images/photos_igt/17.jpg">
<img src="images/photos_igt/18.jpg">
<img src="images/photos_igt/19.jpg">
<img src="images/photos_igt/20.jpg">
</div>
</section>

<!-- MOTIVATION -->
<div class="motivation">
<span id="motivationText"></span>
</div>

<!-- STATS -->
<div class="stats-grid">
<div>Entreprises</div>
<div>Inspections</div>
<div>Infractions</div>
</div>

<!-- ACCÈS RAPIDE -->
<h3 style="text-align:center;margin:10px 0;">ACCÈS RAPIDE</h3>

<div class="quick-grid">
<div>Entreprises</div>
<div>Inspections</div>
<div>Infractions</div>
<div>Travailleurs</div>
<div>Inspecteurs</div>
<div>PV</div>
</div>

</main>

</div>

<!-- NOTIF -->
<div id="notif-container"></div>

<script>

/* SLIDER */
let i=0;
const slides=document.querySelectorAll("#slider img");

setInterval(()=>{
    slides[i].classList.remove("active");
    i=(i+1)%slides.length;
    slides[i].classList.add("active");
},8000);

/* MOTIVATION */
const msg=Array.from({length:40},(_,i)=>"Motivation "+(i+1));
let m=0;

setInterval(()=>{
    document.getElementById("motivationText").innerText=msg[m];
    m=(m+1)%msg.length;
},4000);

/* NOTIF */
setInterval(()=>{
    const box=document.createElement("div");
    box.className="notif";
    box.innerText="WhatsApp ✔ Notification";
    document.getElementById("notif-container").appendChild(box);
    setTimeout(()=>box.remove(),4000);
},9000);

</script>

</body>
    </html>
