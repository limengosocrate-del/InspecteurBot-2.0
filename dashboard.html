<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InspecteurBot RDC PRO</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#eef3fb;}

/* ================= LOGIN ================= */
.login{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(120deg,#061a44,#0b4bd4);
}

.login-box{
    background:#fff;
    padding:40px;
    border-radius:20px;
    width:350px;
    text-align:center;
}

.login-box h2{
    margin-bottom:20px;
}

.login-box input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:10px;
}

.login-box button{
    width:100%;
    padding:12px;
    border:none;
    background:#0b4bd4;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

/* ================= DASHBOARD ================= */
.dashboard{
    display:none;
}

/* SIDEBAR */
.sidebar{
    width:250px;
    height:100vh;
    background:#061a44;
    color:white;
    position:fixed;
    padding:15px;
}

.sidebar img{width:100%;border-radius:12px;margin-bottom:10px;}

.sidebar ul{list-style:none;margin-top:20px;}
.sidebar ul li a{
    display:block;
    padding:12px;
    color:white;
    text-decoration:none;
    border-radius:8px;
}
.sidebar ul li a:hover{background:#0b4bd4;}

/* MAIN */
.main{
    margin-left:250px;
    padding:20px;
}

/* SLIDER */
.slider{
    height:280px;
    position:relative;
    overflow:hidden;
    border-radius:20px;
}
.slider img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    transition:1s;
}
.slider img.active{opacity:1;}

/* STATS */
.stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    margin-top:20px;
}
.card{
    background:white;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

/* ACCES RAPIDE */
.quick{
    margin-top:20px;
}
.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}
.box{
    background:white;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

/* MOTIVATION */
.motivation{
    margin-top:15px;
    background:#0b4bd4;
    color:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

/* NOTIF */
#notif{
    position:fixed;
    bottom:15px;
    right:15px;
}
.note{
    background:#25D366;
    padding:10px;
    border-radius:10px;
    color:white;
    margin-top:10px;
}

/* BUTTON */
.logout{
    background:red;
    color:white;
    padding:10px;
    text-align:center;
    border-radius:10px;
    margin-top:20px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div class="login" id="loginPage">
    <div class="login-box">
        <h2>InspecteurBot RDC</h2>
        <input type="text" id="user" placeholder="Utilisateur">
        <input type="password" id="pass" placeholder="Mot de passe">
        <button onclick="login()">Connexion</button>
    </div>
</div>

<!-- ================= DASHBOARD ================= -->
<div class="dashboard" id="dashboard">

<div class="sidebar">

<img src="images/photos_igt/1.jpg">

<ul>
<li><a href="#"><i class="fa fa-home"></i> Tableau de bord</a></li>
<li><a href="#">Entreprises</a></li>
<li><a href="#">Inspections</a></li>
<li><a href="#">Infractions</a></li>
<li><a href="#">Travailleurs</a></li>
</ul>

<div class="logout" onclick="logout()">Déconnexion</div>

</div>

<div class="main">

<!-- SLIDER -->
<div class="slider">
<img src="images/photos_igt/1.jpg" class="active">
<img src="images/photos_igt/2.jpg">
<img src="images/photos_igt/3.jpg">
</div>

<!-- STATS -->
<div class="stats">
<div class="card">Entreprises<br><b>1248</b></div>
<div class="card">Inspections<br><b>532</b></div>
<div class="card">Infractions<br><b>189</b></div>
<div class="card">Travailleurs<br><b>12845</b></div>
</div>

<!-- MOTIVATION -->
<div class="motivation" id="motivation">
Le travail construit la nation
</div>

<!-- QUICK -->
<div class="quick">
<h2>Accès rapide</h2>
<div class="grid">
<div class="box">Entreprises</div>
<div class="box">Inspections</div>
<div class="box">Infractions</div>
<div class="box">PV</div>
</div>
</div>

</div>

</div>

<!-- NOTIF -->
<div id="notif"></div>

<script>

/* LOGIN SIMPLE */
function login(){
    let u=document.getElementById("user").value;
    let p=document.getElementById("pass").value;

    if(u=="admin" && p=="1234"){
        document.getElementById("loginPage").style.display="none";
        document.getElementById("dashboard").style.display="block";
    }else{
        alert("Erreur connexion");
    }
}

function logout(){
    location.reload();
}

/* SLIDER */
let i=0;
const slides=document.querySelectorAll(".slider img");

setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},4000);

/* MOTIVATION */
const msg=[
"Le travail construit la nation",
"La discipline mène au succès",
"Inspecter protège les travailleurs",
"Justice sociale"
];

let m=0;
setInterval(()=>{
document.getElementById("motivation").innerText=msg[m];
m=(m+1)%msg.length;
},5000);

/* NOTIF */
setInterval(()=>{
let n=document.createElement("div");
n.className="note";
n.innerText="Nouvelle activité";
document.getElementById("notif").appendChild(n);
setTimeout(()=>n.remove(),4000);
},7000);

</script>

</body>
    </html>
