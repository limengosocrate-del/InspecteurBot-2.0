<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procès-Verbaux</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="main-content">

<section class="dashboard-section">

<h2>
<i class="fa-solid fa-file-signature"></i>
PROCÈS-VERBAUX
</h2>

<div class="chart-box">

<h3>Nouveau Procès-Verbal</h3>

<form id="formPV">

<input
type="text"
id="numeroPV"
placeholder="Numéro du PV"
required>

<br><br>

<input
type="date"
id="datePV"
required>

<br><br>

<input
type="text"
id="entreprisePV"
placeholder="Nom de l'entreprise"
required>

<br><br>

<label>Type de Procès-Verbal</label>

<select id="typePV">

<option>
PV de clôture de mission auprès de la société
</option>

<option>
Procès-verbal constat d'infraction
</option>

<option>
Procès-verbal constat d'obstruction
</option>

<option>
Procès-verbal d'audition
</option>

<option>
Procès-verbal de mise en demeure
</option>

<option>
Procès-verbal de conciliation
</option>

<option>
Procès-verbal de contrôle
</option>

<option>
Procès-verbal de constat
</option>

<option>
Autre type de procès-verbal
</option>

</select>

<br><br>

<button type="submit">
Enregistrer
</button>

</form>

</div>

<br>

<div class="inspection-list">

<h3>Liste des Procès-Verbaux</h3>

<table>

<thead>

<tr>
<th>N° PV</th>
<th>Date</th>
<th>Entreprise</th>
<th>Type de PV</th>
<th>Action</th>
</tr>

</thead>

<tbody id="tablePV">

</tbody>

</table>

</div>

</section>

</div>

<script>

let pv =
JSON.parse(
localStorage.getItem("pv")
) || [];

function afficherPV(){

let html = "";

pv.forEach((p,index)=>{

html += `
<tr>

<td>${p.numero}</td>

<td>${p.date}</td>

<td>${p.entreprise}</td>

<td>${p.type}</td>

<td>

<button
onclick="supprimerPV(${index})">

Supprimer

</button>

</td>

</tr>
`;

});

document.getElementById(
"tablePV"
).innerHTML = html;
}

document.getElementById(
"formPV"
).addEventListener(
"submit",
function(e){

e.preventDefault();

pv.push({

numero:
document.getElementById(
"numeroPV"
).value,

date:
document.getElementById(
"datePV"
).value,

entreprise:
document.getElementById(
"entreprisePV"
).value,

type:
document.getElementById(
"typePV"
).value

});

localStorage.setItem(
"pv",
JSON.stringify(pv)
);

this.reset();

afficherPV();

});

function supprimerPV(index){

if(confirm(
"Supprimer ce procès-verbal ?"
)){

pv.splice(index,1);

localStorage.setItem(
"pv",
JSON.stringify(pv)
);

afficherPV();

}
}

afficherPV();

</script>

</body>
</html>
