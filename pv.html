<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InspecteurBot — Module Procès-Verbaux</title>
<style>
/* ===================================================================
   INSPECTEURBOT — STYLE UNIQUE COMPLET
=================================================================== */
:root{
  --primary:#0a3d91; --primary-dark:#072a66; --accent:#c0202a;
  --success:#2e7d32; --warning:#ed6c02; --gray:#64748b;
  --gray-light:#f1f5f9; --border:#e2e8f0;
  --shadow:0 2px 8px rgba(0,0,0,.08); --radius:10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f8fafc;color:#1e293b;line-height:1.5;}
a{color:var(--primary);text-decoration:none;}
button{cursor:pointer;font-family:inherit;}
.hidden{display:none !important;}

/* ===== SHELL ===== */
.ib-shell{display:flex;min-height:100vh;}
.ib-sidebar{width:250px;background:var(--primary-dark);color:#fff;padding:20px 0;position:sticky;top:0;height:100vh;overflow-y:auto;}
.ib-logo{font-weight:700;font-size:1.2rem;padding:0 20px 20px;border-bottom:1px solid rgba(255,255,255,.15);}
.ib-sidebar ul{list-style:none;margin-top:12px;}
.ib-sidebar li a{display:block;color:#cbd5e1;padding:12px 20px;transition:.2s;border-left:3px solid transparent;}
.ib-sidebar li a:hover,.ib-sidebar li a.actif{background:rgba(255,255,255,.08);color:#fff;border-left-color:var(--accent);}
.ib-main{flex:1;padding:28px;max-width:calc(100vw - 250px);}

/* ===== BOUTONS ===== */
.btn{padding:9px 16px;border:1px solid var(--border);background:#fff;border-radius:8px;font-size:.9rem;transition:.2s;color:#334155;}
.btn:hover{background:var(--gray-light);}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary);}
.btn-primary:hover{background:var(--primary-dark);}
.btn-ia{background:#6d28d9;color:#fff;border-color:#6d28d9;}
.btn-sm{padding:6px 12px;font-size:.8rem;}
.btn-danger{background:var(--accent);color:#fff;border-color:var(--accent);}

/* ===== BADGES ===== */
.badge{padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600;text-transform:capitalize;}
.badge.brouillon{background:#fef3c7;color:#92400e;}
.badge.en_cours{background:#dbeafe;color:#1e40af;}
.badge.signe{background:#d1fae5;color:#065f46;}
.badge.transmis{background:#e0e7ff;color:#3730a3;}
.badge.archive{background:#e2e8f0;color:#475569;}
.gravite-badge{padding:2px 8px;border-radius:6px;font-size:.72rem;color:#fff;font-weight:600;}
.gravite-badge.legere{background:#4caf50;}
.gravite-badge.moyenne{background:#ff9800;}
.gravite-badge.grave{background:#f44336;}
.gravite-badge.tres_grave{background:#b71c1c;}

/* ===== DASHBOARD ===== */
h1{margin-bottom:24px;color:var(--primary-dark);}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:28px;}
.kpi{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);text-align:center;border-top:3px solid var(--primary);transition:.2s;}
.kpi:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,0,0,.12);}
.kpi-ico{font-size:1.8rem;}
.kpi-val{font-size:1.6rem;font-weight:700;color:var(--primary-dark);margin:6px 0;}
.kpi-lbl{font-size:.82rem;color:var(--gray);}
.dash-cols{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);}
.card h2{font-size:1.05rem;margin-bottom:14px;color:var(--primary-dark);}
.liste-pv,.activite{list-style:none;}
.liste-pv li{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.activite li{padding:6px 0;font-size:.85rem;border-bottom:1px solid var(--border);}
.activite em{color:var(--gray);font-size:.75rem;}

/* ===== MODÈLES ===== */
.modeles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
.modele-card{background:#fff;border:2px solid var(--border);border-radius:var(--radius);padding:28px 20px;font-size:1rem;font-weight:600;color:var(--primary-dark);transition:.2s;text-align:left;}
.modele-card:hover{border-color:var(--primary);background:#f0f5ff;transform:translateY(-2px);}

/* ===== TABLES LISTE ===== */
.table-liste{width:100%;border-collapse:collapse;background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.table-liste th,.table-liste td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--border);}
.table-liste th{background:var(--gray-light);font-size:.85rem;text-transform:uppercase;color:var(--gray);}
.table-liste tr{cursor:pointer;transition:.15s;}
.table-liste tbody tr:hover{background:#f8fafc;}

/* ===== ÉDITEUR ===== */
.editeur-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.editeur-header h1{font-size:1.3rem;margin:0;}
.editeur-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.editeur-body{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;}
.pv-form fieldset{border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:18px;background:#fff;}
.pv-form legend{font-weight:700;color:var(--primary);padding:0 8px;}
.pv-form label{display:block;margin-bottom:12px;font-size:.85rem;font-weight:600;color:#475569;}
.pv-form input,.pv-form select,.pv-form textarea{width:100%;padding:9px 11px;margin-top:4px;border:1px solid var(--border);border-radius:8px;font-size:.9rem;font-weight:400;font-family:inherit;}
.pv-form input:focus,.pv-form select:focus,.pv-form textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(10,61,145,.1);}
.pv-form input[readonly]{background:var(--gray-light);}
.champ-voix{display:flex;gap:6px;}
.champ-voix input,.champ-voix textarea{flex:1;}
.btn-mic{background:var(--gray-light);border:1px solid var(--border);border-radius:8px;padding:0 12px;font-size:1rem;}
.btn-mic.actif{background:var(--accent);color:#fff;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.numero-field{display:flex;gap:8px;}
.numero-field input{flex:1;}

/* Tableau infractions */
.fieldset-infractions{grid-column:1/-1;}
.infraction-ajout{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.infraction-ajout select{flex:1;min-width:200px;padding:9px;border:1px solid var(--border);border-radius:8px;}
.infraction-ajout input{width:70px;padding:9px;border:1px solid var(--border);border-radius:8px;}
.table-infractions{width:100%;border-collapse:collapse;font-size:.82rem;background:#fff;}
.table-infractions th,.table-infractions td{padding:8px;border:1px solid var(--border);}
.table-infractions th{background:var(--gray-light);}
.table-infractions input{width:100%;padding:5px;border:1px solid var(--border);border-radius:6px;}
.inp-montant,.inp-qte{max-width:80px;}
.btn-suppr{background:transparent;border:none;font-size:1rem;}
.c-montant{text-align:right;white-space:nowrap;}

/* Aperçu */
.editeur-preview{position:sticky;top:20px;}
.preview-toolbar{background:var(--primary-dark);color:#fff;padding:8px 14px;border-radius:8px 8px 0 0;font-size:.8rem;}
.preview-zone{background:#64748b;padding:20px;border-radius:0 0 8px 8px;max-height:80vh;overflow-y:auto;}
.preview-zone .a4{transform:scale(.68);transform-origin:top center;box-shadow:0 4px 20px rgba(0,0,0,.3);margin-bottom:-90mm;}

/* ===== MODALES ===== */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;}
.modal-content{background:#fff;padding:28px;border-radius:14px;max-width:640px;width:90%;max-height:88vh;overflow-y:auto;}
.modal-actions{display:flex;gap:10px;margin-top:16px;justify-content:flex-end;}
.sig-canvas{border:2px dashed var(--border);border-radius:8px;width:100%;touch-action:none;background:#fff;}
#iaFaits{width:100%;min-height:100px;padding:12px;border:1px solid var(--border);border-radius:8px;margin-bottom:12px;}
.ia-bloc{background:var(--gray-light);border-radius:8px;padding:14px;margin-bottom:12px;}
.ia-bloc h3{font-size:.95rem;margin-bottom:8px;}
.ia-bloc ul{list-style:none;}
.ia-bloc li{padding:4px 0;font-size:.85rem;}
.ia-err{color:var(--accent);}.ia-warn{color:var(--warning);}.ia-sugg{color:var(--primary);}

/* Chat IA */
.chat{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.chat-log{height:400px;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
.msg{padding:10px 14px;border-radius:12px;max-width:80%;font-size:.9rem;}
.msg.user{background:var(--primary);color:#fff;align-self:flex-end;}
.msg.bot{background:var(--gray-light);align-self:flex-start;white-space:pre-wrap;}
.chat-input{display:flex;gap:8px;padding:12px;border-top:1px solid var(--border);}
.chat-input textarea{flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;resize:none;height:50px;}

/* Recherche */
.recherche-form{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;background:#fff;padding:20px;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px;}
.recherche-form input,.recherche-form select{padding:9px;border:1px solid var(--border);border-radius:8px;}

/* Stats */
.stat-bloc{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:20px;}
.stat-bloc h2{margin-bottom:14px;color:var(--primary-dark);font-size:1.05rem;}
.stat-bar{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.stat-bar .label{width:200px;font-size:.85rem;}
.stat-bar .bar{height:22px;background:var(--primary);border-radius:4px;min-width:2px;}
.stat-bar .val{font-size:.8rem;font-weight:600;}

/* ================= RENDU A4 (PV) ================= */
.a4{width:210mm;min-height:297mm;padding:18mm 16mm;margin:0 auto;background:#fff;box-sizing:border-box;font-family:"Times New Roman",serif;font-size:12pt;line-height:1.5;color:#000;position:relative;}
.pv-entete{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px;}
.pv-logo{text-align:center;min-width:70px;}
.armoirie{width:60px;height:auto;}
.igt-label{font-weight:bold;font-size:9pt;}
.pv-entete-text p{margin:0;font-size:11pt;}
.pv-entete-text .rdc{font-weight:bold;}
.pv-entete-text .bleu{color:#1a4b9c;font-weight:bold;font-size:13pt;}
.pv-entete-text .rouge{color:#c0202a;font-weight:bold;font-size:13pt;}
.pv-titre{text-align:center;font-size:15pt;font-weight:bold;text-decoration:underline;margin:18px 0 4px;}
.pv-numero{text-align:center;font-weight:bold;text-decoration:underline;margin-bottom:16px;font-size:12pt;}
.pv-sous-titre{text-align:center;text-decoration:underline;margin:14px 0;font-size:13pt;}
.pv-section{font-weight:bold;margin:16px 0 8px;font-size:12pt;}
.pv-corps p{margin-bottom:10px;text-align:justify;}
.pv-corps p.indent{text-indent:2.5em;}
.pv-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:10.5pt;}
.pv-table th,.pv-table td{border:1px solid #000;padding:5px 7px;vertical-align:top;}
.pv-table .c-num{text-align:center;width:34px;}
.constat-liste{margin:10px 0 10px 20px;}
.constat-liste li{margin-bottom:6px;text-align:justify;}
.pv-lieu-date{text-align:right;margin-top:14px;}
.pv-signatures{display:flex;justify-content:space-between;margin-top:36px;gap:20px;}
.pv-signatures.trois{margin-top:24px;}
.sig-bloc{flex:1;}
.sig-titre{font-weight:bold;}
.sig-zone{min-height:60px;border-bottom:1px solid #999;margin-top:8px;position:relative;}
.sig-img{max-height:58px;}
.pv-signature-centre{text-align:center;margin-top:30px;}
.pv-signature-centre .sig-zone{max-width:280px;margin:8px auto;}
.cachet{position:absolute;max-width:120px;opacity:.85;}
.pv-qr{position:absolute;bottom:12mm;right:16mm;text-align:center;font-size:7pt;}
.pv-qr img{width:85px;height:85px;}
/* Lettre (mise en demeure) */
.lettre-date{text-align:right;margin-bottom:14px;}
.lettre-cols{display:flex;justify-content:space-between;gap:20px;margin:14px 0;font-size:11pt;}
.lettre-copies ul{margin-left:16px;}
.lettre-objet-dest{display:flex;justify-content:space-between;gap:20px;margin:14px 0;}
.lettre-corps p{margin-bottom:10px;text-align:justify;}
.lettre-corps p.indent{text-indent:2.5em;}
.lettre-signature{margin-top:30px;text-align:right;}
.lettre-signature .sig-zone{max-width:250px;margin-left:auto;}

/* ===== RESPONSIVE ===== */
@media(max-width:1024px){
  .editeur-body{grid-template-columns:1fr;}
  .editeur-preview{position:static;}
  .dash-cols{grid-template-columns:1fr;}
  .preview-zone .a4{transform:scale(.55);margin-bottom:-120mm;}
}
@media(max-width:768px){
  .ib-shell{flex-direction:column;}
  .ib-sidebar{width:100%;height:auto;position:static;}
  .ib-sidebar ul{display:flex;flex-wrap:wrap;}
  .ib-sidebar li a{border-left:none;border-bottom:3px solid transparent;}
  .ib-main{max-width:100%;padding:16px;}
  .preview-zone .a4{transform:scale(.42);margin-bottom:-150mm;}
}
/* ===== IMPRESSION ===== */
@media print{
  body *{visibility:hidden;}
  #printArea,#printArea *{visibility:visible;}
  #printArea{position:absolute;top:0;left:0;width:100%;}
  .a4{margin:0;box-shadow:none;transform:none !important;}
  @page{size:A4;margin:0;}
}
</style>
</head>

<script>
/* ===================================================================
   INSPECTEURBOT — NOYAU (Store, Router, Calculs)
=================================================================== */
const KEY='inspecteurbot_pv';

const Store={
 state:JSON.parse(localStorage.getItem(KEY))||{
   pvs:[],archives:[],
   parametres:{inspecteurs:[],numerotation:{mode:'auto',dernierNumero:0},tauxUsdFc:2800},
   journal:[],utilisateurCourant:'inspecteur'
 },
 save(){localStorage.setItem(KEY,JSON.stringify(this.state));},
 get(k){return this.state[k];},
 set(k,v){this.state[k]=v;this.save();},
 uid(){return 'pv_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);},
 addPV(pv){
   pv.id=pv.id||this.uid();
   pv.dateCreation=new Date().toISOString();
   pv.dateModification=pv.dateCreation;
   pv.versions=[];
   this.state.pvs.push(pv);
   this.log('creation',`PV ${pv.numero||pv.id} créé`);
   this.save();return pv;
 },
 updatePV(id,data){
   const pv=this.getPV(id);if(!pv)return null;
   pv.versions=pv.versions||[];
   if(pv.versions.length<50)pv.versions.push({date:new Date().toISOString()});
   Object.assign(pv,data);
   pv.dateModification=new Date().toISOString();
   this.save();return pv;
 },
 deletePV(id){
   const pv=this.getPV(id);if(!pv)return false;
   this.state.archives.push({...pv,dateArchivage:new Date().toISOString()});
   this.state.pvs=this.state.pvs.filter(p=>p.id!==id);
   this.log('archivage',`PV ${pv.numero||id} archivé`);
   this.save();return true;
 },
 getPV(id){return this.state.pvs.find(p=>p.id===id);},
 log(type,desc){
   this.state.journal.push({type,description:desc,date:new Date().toISOString(),utilisateur:this.state.utilisateurCourant});
   if(this.state.journal.length>3000)this.state.journal.shift();
 }
};

/* ---- ROUTER ---- */
const Router={
 routes:{},current:null,
 register(p,h){this.routes[p]=h;return this;},
 navigate(p){location.hash=p;},
 start(){window.addEventListener('hashchange',()=>this.resolve());this.resolve();},
 resolve(){
   const hash=location.hash.slice(1)||'accueil';
   const [path,...params]=hash.split('/');
   const h=this.routes[path]||this.routes['accueil'];
   this.current=path;
   document.querySelectorAll('.ib-sidebar a').forEach(a=>a.classList.toggle('actif',a.getAttribute('href')==='#'+path));
   if(h)h(params);
 }
};

/* ---- STATUTS ---- */
const STATUTS={BROUILLON:'brouillon',EN_COURS:'en_cours',SIGNE:'signe',TRANSMIS:'transmis',ARCHIVE:'archive'};
const MOIS_FR=['JANVIER','FÉVRIER','MARS','AVRIL','MAI','JUIN','JUILLET','AOÛT','SEPTEMBRE','OCTOBRE','NOVEMBRE','DÉCEMBRE'];

/* ---- NUMÉROTATION ---- */
function numeroExiste(seq,type){return Store.get('pvs').some(p=>p.type===type&&p.sequence===seq);}
function genererNumero(type,data={}){
 const m=getModele(type);if(!m||!m.aNumero)return '';
 const params=Store.get('parametres');let seq;
 if(params.numerotation.mode==='auto'){
   seq=params.numerotation.dernierNumero+1;
   while(numeroExiste(seq,type))seq++;
   params.numerotation.dernierNumero=seq;Store.set('parametres',params);
 }else{
   seq=parseInt(data.numeroManuel);
   if(!seq){alert('Saisissez un numéro manuel.');return '';}
   if(numeroExiste(seq,type)){alert('Numéro déjà utilisé (doublon interdit).');return '';}
 }
 const now=new Date();
 return m.formatNumero
  .replace('....',String(seq).padStart(3,'0'))
  .replace('{numero}',seq)
  .replace('{initiales}',data.initiales||'XXX')
  .replace('{ville}',data.ville||'')
  .replace('{MOIS}',MOIS_FR[now.getMonth()])
  .replace('{ANNEE}',data.annee||now.getFullYear());
}
function initiales(nom){if(!nom)return 'XXX';return nom.trim().split(/\s+/).map(m=>m[0]).join('').toUpperCase().slice(0,3);}

/* ---- PV MANAGER ---- */
function creerPV(type,data={}){
 const m=getModele(type);if(!m)throw new Error('Type inconnu');
 return Store.addPV({type,titre:m.titre,statut:STATUTS.BROUILLON,infractions:[],...data});
}
function changerStatut(id,statut){
 const pv=Store.getPV(id);if(!pv)return;
 if(statut===STATUTS.SIGNE&&!aUneSignature(pv)){alert('Signature manquante.');return;}
 Store.updatePV(id,{statut});Store.log('statut',`PV ${pv.numero||id} → ${statut}`);Store.save();
}
function aUneSignature(pv){return pv.signatureVerbalisateur||pv.signatureInspecteur||pv.signatureOpj||pv.signatureDemandeur;}
function detecterDoublons(pv){
 const mois=new Date(pv.dateCreation).getMonth();
 return Store.get('pvs').filter(p=>p.id!==pv.id&&p.type===pv.type&&(p.entreprise||'').toLowerCase()===(pv.entreprise||'').toLowerCase()&&new Date(p.dateCreation).getMonth()===mois);
}

/* ---- CALCUL AMENDES ---- */
function extraireMontant(s){const m=(s||'').match(/(\d[\d\s]*\d|\d)/);return m?Number(m[0].replace(/\s/g,'')):0;}
function formaterMontant(m,dev='USD'){return (m||0).toLocaleString('fr-FR')+' '+(dev==='USD'?'$':'FC');}
function construireLigne(id,opt={}){
 const inf=getInfractionById(id);if(!inf)return null;
 const q=opt.quantite||1;
 const mu=opt.montantUnitaire!=null?opt.montantUnitaire:extraireMontant(inf.sanction);
 return {infractionId:inf.id,libelle:inf.libelle,articles:inf.articles,refSanction:inf.refSanction,gravite:inf.gravite,graviteLabel:NIVEAUX_GRAVITE[inf.gravite].label,montantUnitaire:mu,quantite:q,montant:mu*q,montantAffiche:formaterMontant(mu*q,opt.devise),observation:opt.observation||'',modifiable:opt.modifiable!==false};
}
function calculerTotaux(lignes,dev='USD'){
 const r=(lignes||[]).map(l=>({...l,montant:l.montantUnitaire*l.quantite,montantAffiche:formaterMontant(l.montantUnitaire*l.quantite,dev)}));
 const t=r.reduce((s,l)=>s+l.montant,0);
 return {lignes:r,totalGeneral:t,totalAffiche:formaterMontant(t,dev),totalLettres:montantEnLettres(t)+(dev==='USD'?' dollars américains':' francs congolais')};
}
function montantEnLettres(n){
 if(n===0)return 'zéro';
 const u=['','un','deux','trois','quatre','cinq','six','sept','huit','neuf','dix','onze','douze','treize','quatorze','quinze','seize','dix-sept','dix-huit','dix-neuf'];
 const d=['','','vingt','trente','quarante','cinquante','soixante','septante','quatre-vingt','nonante'];
 function tr(x){let s='';const c=Math.floor(x/100),r=x%100;if(c>0)s+=(c>1?u[c]+' cent':'cent')+' ';if(r<20)s+=u[r];else{s+=d[Math.floor(r/10)];if(r%10)s+='-'+u[r%10];}return s.trim();}
 let res='';const mi=Math.floor(n/1e6),ml=Math.floor((n%1e6)/1000),re=n%1000;
 if(mi)res+=(mi>1?tr(mi)+' millions ':'un million ');
 if(ml)res+=(ml>1?tr(ml)+' mille ':'mille ');
 if(re)res+=tr(re);
 return res.trim();
}
</script>

function placerFormatInfo(m){

 const base=`${pv.type}|${pv.numero||pv.id}|${pv.dateCreation}`;let h=0;
 for(let i=0;i<base.length;i++)h=((h<<5)-h+base.charCodeAt(i))|0;
 return `IBOT-${Math.abs(h).toString(36).toUpperCase()}-${Date.now().toString(36).toUpperCase()}`;
}
function genererQR(contenu,taille){
 taille=taille||170;
 try{
  if(window.QRLocal){
   return window.QRLocal.toDataURL(contenu,taille);
  }
 }catch(e){
  console.warn('QR local échec, fallback:',e.message);
 }
 // Fallback (seulement si la lib locale échoue)
 return 'https://api.qrserver.com/v1/create-qr-code/?size='+taille+'x'+taille+'&ecc=H&data='+encodeURIComponent(contenu);
}

/* IMPRESSION / PDF */
function imprimerPV(pv){
 let z=document.getElementById('printArea');
 if(!z){z=document.createElement('div');z.id='printArea';document.body.appendChild(z);}
 z.innerHTML=renderPV(pv);
 window.print();
}
function exporterPDF(pv){
 // Utilise l'impression navigateur -> "Enregistrer au format PDF"
 alert("Dans la boîte d'impression, choisissez « Enregistrer au format PDF » comme imprimante.");
 imprimerPV(pv);
}

/* VOIX */
let recVocal=null;
function demarrerDictee(champ,btn){
 const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
 if(!SR){alert("Dictée non supportée par ce navigateur.");return;}
 if(btn.classList.contains('actif')){recVocal&&recVocal.stop();btn.classList.remove('actif');return;}
 recVocal=new SR();recVocal.lang='fr-FR';recVocal.continuous=true;recVocal.interimResults=false;
 recVocal.onresult=e=>{let txt='';for(let i=e.resultIndex;i<e.results.length;i++)if(e.results[i].isFinal)txt+=e.results[i][0].transcript;
  if(txt){champ.value+=(champ.value?' ':'')+txt.trim();champ.dispatchEvent(new Event('input'));}};
 recVocal.onend=()=>btn.classList.remove('actif');
 recVocal.start();btn.classList.add('actif');
}
function lirePV(pv){
 if(!window.speechSynthesis){alert("Lecture non supportée.");return;}
 speechSynthesis.cancel();
 const parts=[pv.titre,`Numéro ${pv.numero||'non attribué'}.`,`Entreprise ${pv.entreprise||'non renseignée'}.`,`Inspecteur ${pv.inspecteur||''}.`];
 (pv.infractions||[]).forEach((i,n)=>parts.push(`Infraction ${n+1}: ${i.libelle}, ${i.articles}, montant ${i.montantAffiche}.`));
 if((pv.infractions||[]).length)parts.push(`Total général : ${pv.totalAffiche||''}.`);
 const u=new SpeechSynthesisUtterance(parts.join(' '));u.lang='fr-FR';u.rate=.95;speechSynthesis.speak(u);
}

function brancherInfractions(){
 document.getElementById('btnAddInf').onclick=()=>{

function brancherSignature(){
 const modal=document.getElementById('modalSig');let pad=null;
 document.getElementById('btnSigner').onclick=()=>{
  const pv=Store.getPV(currentId);const dbl=detecterDoublons(pv);
  if(dbl.length&&!confirm(`⚠️ ${dbl.length} PV similaire(s) pour cette entreprise ce mois-ci. Continuer ?`))return;
  modal.classList.remove('hidden');setTimeout(()=>pad=new SignaturePad(document.getElementById('sigCanvas')),60);};
 document.getElementById('sigClear').onclick=()=>pad&&pad.clear();
 document.getElementById('sigCancel').onclick=()=>modal.classList.add('hidden');
 document.getElementById('sigSave').onclick=()=>{
  if(!pad||pad.isEmpty()){alert('Veuillez signer.');return;}
  const pv=Store.getPV(currentId),m=getModele(pv.type);
  const role=m.aSignatures[0];const key='signature'+role.charAt(0).toUpperCase()+role.slice(1);
  pv[key]=pad.toDataURL();
  const scelle=scellerPV(pv);Store.updatePV(currentId,scelle);
  changerStatut(currentId,STATUTS.SIGNE);
  modal.classList.add('hidden');ouvrirEditeur(currentId);
  alert('✅ PV signé et scellé (QR Code + identifiant unique).');};

function brancherIA(){

    ${a.infractions.length?`<p><strong>Total estimé : ${a.totaux.totalAffiche}</strong></p><button id="iaApp" class="btn btn-primary">Appliquer au PV</button>`:''}</div>

    ${c.suggestions.map(s=>`<p class="ia-sugg">💡 ${esc(s)}</p>`).join('')||'<p>✅ Aucune anomalie.</p>'}</div>`;
  const btn=document.getElementById('iaApp');
  if(btn)btn.onclick=()=>{const pv=Store.getPV(currentId);pv.infractions=a.lignes;pv.faits=faits;majTotaux(pv);sauver();modal.classList.add('hidden');ouvrirEditeur(currentId);};
 };

<script>
/* ===================================================================
   INSPECTEURBOT — SCANNER QR PAR CAMÉRA (décodeur local hors-ligne)
=================================================================== */
(function(global){
'use strict';

/* --- Détection des 3 finder patterns + décodage simplifié --- */
/* Décodeur basé sur analyse de luminance + reconstruction de grille */

function toGray(imgData){
 var d=imgData.data,w=imgData.width,h=imgData.height;
 var gray=new Uint8ClampedArray(w*h);
 for(var i=0;i<w*h;i++){gray[i]=(d[i*4]*0.299+d[i*4+1]*0.587+d[i*4+2]*0.114)|0;}
 return {data:gray,width:w,height:h};
}

/* Seuillage adaptatif (Otsu simplifié par blocs) */
function binariser(gray){
 var d=gray.data,w=gray.width,h=gray.height;
 var bin=new Uint8ClampedArray(w*h);
 var bs=Math.max(16,Math.floor(w/8));
 for(var by=0;by<h;by+=bs)for(var bx=0;bx<w;bx+=bs){
  var sum=0,cnt=0;
  for(var y=by;y<Math.min(by+bs,h);y++)for(var x=bx;x<Math.min(bx+bs,w);x++){sum+=d[y*w+x];cnt++;}
  var seuil=(sum/cnt)-8;
  for(var y2=by;y2<Math.min(by+bs,h);y2++)for(var x2=bx;x2<Math.min(bx+bs,w);x2++){
   bin[y2*w+x2]=d[y2*w+x2]<seuil?1:0;}
 }
 return {data:bin,width:w,height:h};
}

/* Recherche des finder patterns (ratio 1:1:3:1:1) */
function trouverFinders(bin){
 var d=bin.data,w=bin.width,h=bin.height;var finders=[];
 function ratioOK(counts){
  var total=counts[0]+counts[1]+counts[2]+counts[3]+counts[4];
  if(total<7)return false;var mod=total/7,tol=mod*0.6;
  return Math.abs(counts[0]-mod)<tol&&Math.abs(counts[1]-mod)<tol&&Math.abs(counts[2]-3*mod)<3*tol&&Math.abs(counts[3]-mod)<tol&&Math.abs(counts[4]-mod)<tol;
 }
 for(var y=0;y<h;y++){
  var counts=[0,0,0,0,0],state=0,prev=0;
  for(var x=0;x<w;x++){
   var px=d[y*w+x];
   if(px===1){if(state%2===0){state++;}counts[state<5?state:4]++;}
   else{if(state%2===1){state++;}if(state<5)counts[state]++;}
   if(state>=5||(x===w-1)){
    if(ratioOK(counts)){var cx=x-(counts[3]+counts[4]+counts[2]/2);finders.push({x:cx|0,y:y});}
    counts=[0,0,0,0,0];state=0;
   }
  }
 }
 // Regroupement des points proches
 var groups=[];
 finders.forEach(function(f){
  var g=groups.find(function(gr){return Math.abs(gr.x-f.x)<20&&Math.abs(gr.y-f.y)<20;});
  if(g){g.x=(g.x*g.n+f.x)/(g.n+1);g.y=(g.y*g.n+f.y)/(g.n+1);g.n++;}
  else groups.push({x:f.x,y:f.y,n:1});
 });
 return groups.filter(function(g){return g.n>=3;}).sort(function(a,b){return b.n-a.n;}).slice(0,3);
}

/* Extraction et décodage du contenu (approche : lecture via BarcodeDetector natif si dispo) */
async function decoderImage(canvas){
 // 1) API native BarcodeDetector (Chrome/Edge/Android) — hors-ligne
 if('BarcodeDetector' in window){
  try{
   var detector=new window.BarcodeDetector({formats:['qr_code']});
   var codes=await detector.detect(canvas);
   if(codes&&codes.length)return codes[0].rawValue;
  }catch(e){}
 }
 // 2) Détection présence QR (finder patterns) pour feedback visuel
 var ctx=canvas.getContext('2d');
 var img=ctx.getImageData(0,0,canvas.width,canvas.height);
 var bin=binariser(toGray(img));
 var finders=trouverFinders(bin);
 if(finders.length>=3){return {detecte:true,message:'QR détecté — rapprochez pour lecture nette'};}
 return null;
}

global.QRScanner={decoder:decoderImage,trouverFinders:trouverFinders};
})(window);

/* ===================================================================
   PAGE SCANNER CAMÉRA
=================================================================== */
let scanStream=null,scanLoop=null;

function pageScanner(){
 app.innerHTML=layout(`<h1>📷 Scanner un QR Code de PV</h1>
  <div class="card" style="max-width:640px">
   <p style="color:#64748b;margin-bottom:12px">Pointez la caméra vers le QR Code d'un procès-verbal pour vérifier son authenticité.</p>
   <div style="position:relative;background:#000;border-radius:10px;overflow:hidden">
    <video id="scanVideo" playsinline style="width:100%;display:block"></video>
    <div style="position:absolute;inset:0;border:3px solid rgba(255,255,255,.5);border-radius:10px;pointer-events:none">
     <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border:2px solid #22c55e;border-radius:8px"></div>
    </div>
   </div>
   <canvas id="scanCanvas" class="hidden"></canvas>
   <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
    <button id="scanStart" class="btn btn-primary">▶️ Démarrer la caméra</button>
    <button id="scanStop" class="btn">⏹️ Arrêter</button>
    <button id="scanFile" class="btn">🖼️ Depuis une image</button>
    <input type="file" id="scanFileInput" accept="image/*" class="hidden">
   </div>
   <div id="scanStatus" style="margin-top:12px;font-size:.9rem;color:#64748b"></div>
   <div id="scanResult" style="margin-top:14px"></div>
  </div>`);

 const video=document.getElementById('scanVideo');
 const canvas=document.getElementById('scanCanvas');
 const status=document.getElementById('scanStatus');

 document.getElementById('scanStart').onclick=async()=>{
  try{
   scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
   video.srcObject=scanStream;await video.play();
   status.textContent='📸 Caméra active — visez le QR Code...';
   lancerScan();
  }catch(e){status.innerHTML='<span style="color:var(--accent)">❌ Impossible d\'accéder à la caméra : '+e.message+'</span>';}
 };
 document.getElementById('scanStop').onclick=arreterScanner;
 document.getElementById('scanFile').onclick=()=>document.getElementById('scanFileInput').click();
 document.getElementById('scanFileInput').onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  const img=new Image();img.onload=async()=>{
   canvas.width=img.width;canvas.height=img.height;
   canvas.getContext('2d').drawImage(img,0,0);
   const r=await QRScanner.decoder(canvas);traiterResultat(r);
  };img.src=URL.createObjectURL(f);
 };

 function lancerScan(){
  scanLoop=setInterval(async()=>{
   if(video.videoWidth===0)return;
   canvas.width=video.videoWidth;canvas.height=video.videoHeight;
   canvas.getContext('2d').drawImage(video,0,0);
   const r=await QRScanner.decoder(canvas);
   if(r){if(typeof r==='string'){arreterScanner();traiterResultat(r);}else{status.textContent='🎯 '+r.message;}}
  },500);
 }
}

function arreterScanner(){
 if(scanLoop){clearInterval(scanLoop);scanLoop=null;}
 if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}
 const s=document.getElementById('scanStatus');if(s)s.textContent='⏹️ Caméra arrêtée.';
}

function traiterResultat(contenu){
 const res=document.getElementById('scanResult');if(!res)return;
 let data=null,id=null;
 try{data=JSON.parse(contenu);id=data.id;}catch{id=contenu;}
 const pv=Store.get('pvs').find(p=>(p.identifiantUnique||'')===id||(p.numero||'')===(data&&data.numero));
 if(pv){
  const auth=pv.statut==='signe'||pv.statut==='transmis';
  res.innerHTML=`<div class="ia-bloc" style="border-left:4px solid ${auth?'var(--success)':'var(--warning)'}">
    <h3>${auth?'✅ PV AUTHENTIQUE VÉRIFIÉ':'⚠️ PV NON SCELLÉ'}</h3>
    <p><strong>Type :</strong> ${esc(pv.titre)}</p>
    <p><strong>Numéro :</strong> ${esc(pv.numero||'—')}</p>
    <p><strong>Entreprise :</strong> ${esc(pv.entreprise||'—')}</p>
    <p><strong>Inspecteur :</strong> ${esc(pv.inspecteur||pv.opj||'—')}</p>
    <p><strong>Identifiant :</strong> ${esc(pv.identifiantUnique||'—')}</p>
    <button class="btn btn-primary" style="margin-top:10px" onclick="location.hash='editer/${pv.id}'">Ouvrir le PV</button>
  </div>`;
 }else{
  res.innerHTML=`<div class="ia-bloc" style="border-left:4px solid var(--accent)">
    <h3>❌ PV NON RECONNU</h3>
    <p>Contenu scanné : <code>${esc(String(contenu).slice(0,120))}</code></p>
    <p>Ce document n'existe pas dans cette base ou provient d'un autre poste.</p></div>`;
 }
}
    </script>
