<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>Vérification Procès-Verbal</title>

    <style>
      body {
        background: #f3f6fa;
        color: #172033;
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        padding: 25px;
      }

      .card {
        background: white;
        border-radius: 16px;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.09);
        margin: 60px auto;
        max-width: 650px;
        padding: 25px;
      }

      h1 {
        margin-top: 0;
      }

      .valid {
        color: #08753f;
        font-weight: 800;
      }

      .invalid {
        color: #b32636;
        font-weight: 800;
      }

      .line {
        border-bottom: 1px solid #d9e1ed;
        padding: 10px 0;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>Vérification d’authenticité</h1>

      <div id="result">Vérification en cours...</div>
    </div>

    <script>
      const result = document.querySelector("#result");
      const token = new URLSearchParams(window.location.search).get("token");

      if (!token) {
        result.innerHTML =
          "<p class='invalid'>QR Code invalide : jeton absent.</p>";
      } else {
        fetch(`/api/verify/${encodeURIComponent(token)}`)
          .then((response) => response.json())
          .then((data) => {
            if (!data.valid) {
              result.innerHTML = `
                <p class="invalid">Document non valide ou non finalisé.</p>
                <p>${data.message || ""}</p>
              `;
              return;
            }

            result.innerHTML = `
              <p class="valid">✓ Procès-Verbal authentifié</p>

              <div class="line">
                <strong>Référence :</strong><br>
                ${data.reference || "—"}
              </div>

              <div class="line">
                <strong>Type de document :</strong><br>
                ${data.type || "—"}
              </div>

              <div class="line">
                <strong>Statut :</strong><br>
                ${data.status || "—"}
              </div>

              <div class="line">
                <strong>Identifiant unique :</strong><br>
                ${data.uniqueId || "—"}
              </div>

              <div class="line">
                <strong>Finalisé le :</strong><br>
                ${
                  data.finalizedAt
                    ? new Date(data.finalizedAt).toLocaleString("fr-FR")
                    : "—"
                }
              </div>

              <div class="line">
                <strong>Empreinte du document :</strong><br>
                <small>${data.integrityHash || "—"}</small>
              </div>
            `;
          })
          .catch(() => {
            result.innerHTML =
              "<p class='invalid'>Impossible de joindre le serveur de vérification.</p>";
          });
      }
    </script>
  </body>
</html>
