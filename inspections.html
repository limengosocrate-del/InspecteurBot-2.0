<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestion des Inspections</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="main-content">

<section class="dashboard-section">

<h2>
<i class="fa-solid fa-clipboard-check"></i>
GESTION DES INSPECTIONS
</h2>

<div class="chart-box">

<h3>Nouvelle Inspection</h3>

<form id="formInspection">

<input
type="text"
id="entreprise"
placeholder="Nom de l'entreprise"
required>

<input
type="date"
id="date"
required>

<input
type="text"
id="inspecteur"
placeholder="Nom de l'inspecteur"
required>

<select id="type" required>

<option value="">
Choisir le type d'inspection
</option>

<option>
Inspection ordinaire
</option>

<option>
Inspection inopinée
</option>

<option>
Contre-visite
</option>

<option>
Inspection spéciale
</option>

<option>
Inspection de sécurité
</option>

<option>
Inspection du travail des enfants
</option>

<option>
Inspection de conformité au SMIG
</option>

</select>

<button type="submit">
<i class="fa-solid fa-floppy-disk"></i>
Enregistrer l'inspection
</button>

</form>

</div>

<div class="inspection-list">

<h3>
<i class="fa-solid fa-list"></i>
Liste des Inspections
</h3>

<table>

<thead>

<tr>
<th>N°</th>
<th>Entreprise</th>
<th>Date</th>
<th>Inspecteur</th>
<th>Type</th>
<th>Action</th>
</tr>

</thead>

<tbody id="listeInspections">

</tbody>

</table>

</div>

</section>

</div>

<script>

let inspections =
JSON.parse(
localStorage.getItem("inspections")
) || [];

function afficherInspections(){

let html = "";

inspections.forEach((i,index)=>{

html += `
<tr>

<td>${index + 1}</td>

<td>${i.entreprise}</td>

<td>${i.date}</td>

<td>${i.inspecteur}</td>

<td>${i.type}</td>

<td>

<button
onclick="supprimerInspection(${index})">

<i class="fa-solid fa-trash"></i>
Supprimer

</button>

</td>

</tr>
`;

});

document.getElementById(
"listeInspections"
).innerHTML = html;

}

document.getElementById(
"formInspection"
).addEventListener(
"submit",
function(e){

e.preventDefault();

inspections.push({

entreprise:
document.getElementById(
"entreprise"
).value,

date:
document.getElementById(
"date"
).value,

inspecteur:
document.getElementById(
"inspecteur"
).value,

type:
document.getElementById(
"type"
).value

});

localStorage.setItem(
"inspections",
JSON.stringify(inspections)
);

this.reset();

afficherInspections();

});

function supprimerInspection(index){

if(confirm(
"Supprimer cette inspection ?"
)){

inspections.splice(index,1);

localStorage.setItem(
"inspections",
JSON.stringify(inspections)
);

afficherInspections();

}

}

afficherInspections();

</script>

</body>
</html>
